<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="旅遊誌">
  <meta name="theme-color" content="#F8F9FA">
  <title>旅遊誌</title>
  <style>
/* ═══════════════════════════════════════
   旅遊誌 — Global Styles
   style.css
═══════════════════════════════════════ */

/* ─── Reset ─── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

/* ─── Design Tokens ─── */
:root {
  --bg: #EBEBF0;
  --surface: rgba(255, 255, 255, 0.72);
  --surface-solid: #fff;
  --border: rgba(0, 0, 0, 0.08);
  --border-thin: rgba(0, 0, 0, 0.06);
  --text-primary: #0A0A0A;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;
  --accent: #1A56DB;
  --accent-light: rgba(26, 86, 219, 0.08);
  --accent-mid: rgba(26, 86, 219, 0.15);
  --danger: #EF4444;
  --mono: 'Menlo', 'Monaco', 'Courier New', monospace;
  --radius: 16px;
  --radius-sm: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 20px);
  --safe-top: env(safe-area-inset-top, 0px);
}

/* ─── Base ─── */
html, body {
  height: 100%;
  width: 100%;
  background: var(--bg);
  font-family: var(--mono);
  color: var(--text-primary);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  width: 100%;
  position: relative;
  overflow: hidden;
}
* { scrollbar-width: none; }
*::-webkit-scrollbar { display: none; }

/* ─── Tab Bar ─── */
#tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(56px + var(--safe-bottom));
  background: rgba(248, 249, 250, 0.92);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-top: 0.5px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-around;
  padding-top: 10px;
  z-index: 100;
}
.tab-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 24px;
  min-width: 80px;
  font-family: var(--mono);
}
.tab-icon svg { width: 24px; height: 24px; display: block; }
.tab-icon svg path { transition: fill 0.2s; fill: #9CA3AF; }
.tab-btn.active .tab-icon svg path { fill: #1A56DB; }
.tab-label {
  font-size: 10px;
  letter-spacing: 0.02em;
  font-weight: 600;
  color: #9CA3AF;
  transition: color 0.2s;
}
.tab-btn.active .tab-label { color: #1A56DB; }

/* ─── Screens ─── */
.screen {
  position: absolute;
  inset: 0;
  padding-bottom: calc(56px + var(--safe-bottom));
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  display: none;
  background: var(--bg);
}
.screen.active { display: block; }

/* ═══════════════════════════════════════
   ITINERARY SCREEN
═══════════════════════════════════════ */
#screen-itinerary { padding-bottom: calc(64px + var(--safe-bottom)); }

/* Banner */
.day-banner {
  position: relative;
  width: 100%;
  height: 280px;
  background: #0f2152;
  overflow: hidden;
}
.banner-slides-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
}
.banner-slide {
  flex-shrink: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
}
.banner-placeholder-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(145deg, #0f2152 0%, #1a3a6b 50%, #0d2847 100%);
}
.banner-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0.06) 0%,
    rgba(0, 0, 0, 0.18) 35%,
    rgba(0, 0, 0, 0.65) 100%
  );
  pointer-events: none;
}
.banner-text-area {
  position: absolute;
  bottom: 0; left: 0; right: 52px;
  padding: 0 20px 24px;
  z-index: 2;
}
.banner-trip-name {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.banner-date-input {
  display: block;
  font-family: var(--mono);
  font-size: 27px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
  line-height: 1.2;
  text-shadow: 0 1px 10px rgba(0, 0, 0, 0.5);
  background: transparent;
  border: none;
  border-bottom: 1.5px solid transparent;
  outline: none;
  width: 100%;
  caret-color: rgba(255, 255, 255, 0.9);
  transition: border-color 0.2s;
}
.banner-date-input::placeholder { color: rgba(255, 255, 255, 0.32); }
.banner-date-input:focus { border-bottom-color: rgba(255, 255, 255, 0.35); }
.banner-subtitle-input {
  display: block;
  font-family: var(--mono);
  font-size: 13px;
  color: rgba(255, 255, 255, 0.82);
  background: transparent;
  border: none;
  border-bottom: 1.5px solid transparent;
  outline: none;
  width: 100%;
  margin-top: 6px;
  caret-color: rgba(255, 255, 255, 0.8);
  line-height: 1.5;
  transition: border-color 0.2s;
}
.banner-subtitle-input::placeholder { color: rgba(255, 255, 255, 0.28); }
.banner-subtitle-input:focus { border-bottom-color: rgba(255, 255, 255, 0.25); }
.banner-photo-btn {
  position: absolute;
  top: calc(var(--safe-top) + 14px);
  right: 14px;
  z-index: 3;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(10px);
  border: 0.5px solid rgba(255, 255, 255, 0.18);
  border-radius: 50%;
  padding: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.banner-dots {
  position: absolute;
  bottom: 10px; right: 20px;
  display: flex;
  gap: 5px;
  z-index: 3;
}
.banner-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.45);
  transition: background 0.3s, width 0.3s;
}
.banner-dot.active { background: #fff; width: 14px; border-radius: 3px; }

/* Day Tabs */
.day-tabs-wrap {
  padding: 0 16px;
  background: var(--bg);
  border-bottom: 0.5px solid var(--border-thin);
  position: sticky;
  top: 0;
  z-index: 10;
}
.day-tabs-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0 0;
}
.day-tabs-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--text-tertiary);
  text-transform: uppercase;
}
.day-add-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--accent);
  font-size: 24px;
  line-height: 1;
  padding: 0 2px;
  font-weight: 700;
}
.day-tabs { display: flex; overflow-x: auto; }
.day-tab {
  flex-shrink: 0;
  min-width: 40px;
  padding: 10px 14px 12px;
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 600;
  color: var(--text-tertiary);
  position: relative;
  transition: color 0.2s;
}
.day-tab.active { color: var(--accent); }
.day-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 8px; right: 8px;
  height: 2px;
  background: var(--accent);
  border-radius: 1px;
}

/* Timeline */
.timeline-section { padding: 16px 16px 20px; }
.add-event-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: 1px solid var(--accent);
  border-radius: 14px;
  padding: 4px 10px;
  color: var(--accent);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  margin-bottom: 22px;
  transition: background 0.15s;
}
.add-event-btn:active { background: var(--accent-light); }
.timeline { position: relative; }
.timeline-item {
  display: flex;
  gap: 12px;
  position: relative;
  animation: fadeInUp 0.22s ease both;
}
.timeline-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 20px;
  flex-shrink: 0;
  padding-top: 3px;
}
.timeline-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  z-index: 1;
}
.timeline-line {
  width: 1.5px;
  flex: 1;
  min-height: 16px;
  background: linear-gradient(to bottom, var(--accent-mid) 0%, transparent 100%);
  margin-top: 4px;
}
.timeline-item:last-child .timeline-line { display: none; }
.timeline-right { flex: 1; padding-bottom: 24px; }
.timeline-time {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.02em;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.timeline-actions { display: flex; gap: 4px; }
.t-action-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  border-radius: 6px;
  transition: background 0.15s;
}
.t-action-btn:active { background: rgba(0, 0, 0, 0.06); }
.t-action-btn svg { width: 20px; height: 20px; display: block; }
.t-action-btn svg path { fill: #9CA3AF; }
.t-action-btn.del:active svg path { fill: var(--danger); }
.timeline-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  margin-top: 3px;
  letter-spacing: -0.2px;
}
.timeline-note {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 5px;
  line-height: 1.65;
  word-break: break-word;
}
.timeline-empty {
  text-align: center;
  padding: 44px 20px;
  color: var(--text-tertiary);
  font-size: 13px;
}

/* ═══════════════════════════════════════
   EXPENSE SCREEN
═══════════════════════════════════════ */
.screen-header {
  padding: calc(var(--safe-top) + 14px) 0 0;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 0.5px solid var(--border-thin);
}
.screen-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.expense-day-selector {
  display: flex;
  overflow-x: auto;
  padding: 0 16px;
}
.expense-total-card {
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.expense-total-label {
  font-size: 13px;
  color: var(--text-secondary);
  font-family: var(--mono);
}
.expense-total-sub {
  font-size: 12px;
  color: var(--text-tertiary);
  font-family: var(--mono);
  margin-top: 3px;
}
.expense-total-amount {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -1.5px;
  color: var(--accent);
  font-family: var(--mono);
  line-height: 1;
}
.expense-trip-total-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  justify-content: flex-end;
}
.expense-trip-label {
  font-size: 11px;
  color: var(--text-tertiary);
  font-family: var(--mono);
  letter-spacing: 0.04em;
}
.expense-trip-amount {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  font-family: var(--mono);
}
.expense-row-cat-only {
  color: var(--text-secondary);
  font-weight: 500;
}

.expense-input-card {
  margin: 0 16px 28px;
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 16px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  position: relative;
}
.expense-add-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
.expense-add-row:last-of-type { margin-bottom: 0; }
.expense-header-total {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  font-family: var(--mono);
  opacity: 0.8;
}
.expense-input {
  background: #F3F4F6;
  border: none;
  border-radius: var(--radius-sm);
  padding: 14px 14px;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text-primary);
  outline: none;
  transition: background 0.15s;
  height: 52px;
  box-sizing: border-box;
  flex: 1;
}
.expense-input:focus { background: #E9EBF0; }
.expense-input::placeholder { color: var(--text-tertiary); font-family: var(--mono); }
.exp-cat-wrap { position: relative; flex: 1; }
.expense-cat-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  text-align: left;
  background: #F3F4F6;
  border: none;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text-primary);
}
.exp-cat-icon-slot { display: flex; align-items: center; flex-shrink: 0; width: 20px; }
.exp-cat-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  z-index: 200;
  min-width: 160px;
  overflow: hidden;
}
.exp-cat-dropdown.open { display: block; }
.exp-cat-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text-primary);
  transition: background 0.1s;
}
.exp-cat-option:active { background: var(--accent-light); }
.exp-cat-opt-icon { display: flex; align-items: center; flex-shrink: 0; }
.exp-cat-opt-label { flex: 1; }
.expense-input-amount { flex: 1; }
.exp-name-input { flex: 1; width: 100%; }
.expense-submit-btn {
  position: absolute;
  bottom: -20px;
  right: 20px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(26,86,219,0.35);
  transition: transform 0.15s, opacity 0.15s;
}
.expense-submit-btn:active { transform: scale(0.92); opacity: 0.85; }
.expense-list { padding: 8px 16px 20px; }
.expense-section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  padding: 4px 0 10px;
}
.expense-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.75);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  animation: fadeInUp 0.2s ease both;
}
.expense-row-icon { font-size: 20px; flex-shrink: 0; }
.expense-row-name { flex: 1; font-size: 14px; font-weight: 600; font-family: var(--mono); }
.expense-row-amount { font-size: 15px; font-weight: 700; color: var(--accent); min-width: 60px; text-align: right; font-family: var(--mono); }
.expense-row-del {
  background: none;
  border: none;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  cursor: pointer;
  padding: 2px;
}
.expense-row-del svg { width: 20px; height: 20px; }
.expense-row-del svg path { fill: #9CA3AF; }

/* ═══════════════════════════════════════
   INFO SCREEN
═══════════════════════════════════════ */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 20px 16px;
}
.info-grid-btn {
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  transition: transform 0.12s, box-shadow 0.12s;
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}
.info-grid-btn:active { transform: scale(0.96); box-shadow: none; }
.info-grid-icon {
  width: 52px; height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Sub-screens */
.screen-sub { display: none; }
.screen-sub.active { display: block; }
.sub-header {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 8px 0 4px !important;
}
.sub-back-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 10px 8px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  margin-top: calc(var(--safe-top) + 10px);
}
.sub-back-btn svg path { fill: var(--accent); }
.sub-header .screen-title { padding: calc(var(--safe-top) + 10px) 0 0 !important; }

.info-section { padding: 12px 16px 20px; }

/* Checklist & Shopping */
.checklist-add-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.checklist-group-card {
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.checklist-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 8px 10px 16px;
  border-bottom: 0.5px solid var(--border-thin);
}
.checklist-group-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--accent);
  font-family: var(--mono);
  flex: 1;
}
.checklist-group-add {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 8px;
  display: flex;
  align-items: center;
  border-radius: 8px;
  transition: background 0.12s;
}
.checklist-group-add:active { background: var(--accent-light); }
.checklist-group-add svg path { fill: var(--accent); }
.check-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 12px 13px 16px;
  border-bottom: 0.5px solid var(--border-thin);
  cursor: pointer;
  transition: background 0.1s;
  -webkit-user-select: none;
  user-select: none;
}
.check-row:last-child { border-bottom: none; }
.check-row:active { background: rgba(0,0,0,0.03); }
.check-row.done .check-text {
  text-decoration: line-through;
  color: var(--text-tertiary);
  font-weight: 400;
}
.check-box {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-radius: 50%;
  background: none;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
  pointer-events: none;
}
.check-box.checked {
  background: var(--accent);
  border-color: var(--accent);
}
.check-box svg path { fill: #fff; }
.check-text {
  flex: 1;
  font-size: 15px;
  font-weight: 700;
  font-family: var(--mono);
  color: var(--text-primary);
  line-height: 1.3;
}
.check-minus {
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  opacity: 0.35;
  transition: opacity 0.15s;
}
.check-minus:active { opacity: 1; }
.check-minus svg path { fill: var(--danger); }
.list-empty { text-align: center; padding: 40px 0; color: var(--text-tertiary); font-size: 13px; font-family: var(--mono); }
[data-theme='dark'] .checklist-group-card { background: var(--surface-solid); }
[data-theme='dark'] .checklist-inline-add { background: rgba(255,255,255,0.08); }
[data-theme='dark'] .checklist-group-card { background: var(--surface-solid); }

.sub-header-action {
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  display: flex;
  align-items: center;
  margin-top: calc(var(--safe-top) + 8px);
  border-radius: 8px;
  transition: background 0.12s;
}

.flight-duration { font-size: 11px; color: rgba(255,255,255,0.38); margin-bottom: 7px; }
.flight-line-wrap { display: flex; align-items: center; width: 100%; }

/* Editable fields */
.editable {

/* ═══════════════════════════════════════
   MODALS
═══════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(5px);
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  width: 100%;
  max-height: 92vh;
  background: rgba(248,249,250,0.98);
  backdrop-filter: blur(30px) saturate(180%);
  border-radius: 22px 22px 0 0;
  padding: 0 0 calc(20px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(0,0,0,0.14); margin: 10px auto 0; }
.modal-title { font-size: 17px; font-weight: 700; text-align: center; padding: 14px 20px 0; letter-spacing: -0.3px; }
.modal-body { padding: 16px 20px; }
.modal-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 6px;
  margin-top: 14px;
}
.modal-label:first-child { margin-top: 0; }
.modal-input {
  width: 100%;
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s;
}
.modal-input:focus { border-color: var(--accent); }
.modal-input::placeholder { color: var(--text-tertiary); }
.modal-textarea {
  width: 100%;
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-primary);
  outline: none;
  resize: none;
  min-height: 80px;
  transition: border-color 0.2s;
  line-height: 1.65;
}
.modal-textarea:focus { border-color: var(--accent); }
.modal-btn-row { display: flex; gap: 10px; margin-top: 20px; }
.modal-btn {
  flex: 1;
  padding: 14px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 600;

}

.modal-btn-cancel { background: rgba(0,0,0,0.07); color: var(--text-secondary); }
.modal-btn-save { background: var(--accent); color: #fff; }
/* ─── Photo Grid ─── */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.photo-cell {
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  overflow: hidden;
  position: relative;
}
.photo-cell-filled {
  background-size: cover;
  background-position: center;
  background-color: #F3F4F6;
}
.photo-cell-del {
  position: absolute;
  top: 6px; right: 6px;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  color: #fff;
  border: none;
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.photo-cell-add {
  background: #F3F4F6;
  border: 1.5px dashed var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.photo-cell-add:active { background: #E9EBF0; }
.photo-cell-add svg path { fill: var(--text-tertiary); }
.photo-cell-add span { font-size: 11px; color: var(--text-tertiary); font-family: var(--mono); }

/* ─── Custom Confirm Dialog ─── */
#app-confirm {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
}
#app-confirm.show {
  opacity: 1;
  pointer-events: all;
}
.confirm-box {
  background: rgba(248,249,250,0.98);
  backdrop-filter: blur(30px);
  border-radius: 18px;
  padding: 24px 24px 16px;
  width: min(320px, calc(100vw - 48px));
  transform: scale(0.94);
  transition: transform 0.18s cubic-bezier(0.4,0,0.2,1);
}
#app-confirm.show .confirm-box {
  transform: scale(1);
}
.confirm-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}
.confirm-msg {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 20px;
}
.confirm-btns {
  display: flex;
  gap: 10px;
}
.confirm-btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.12s;
}
.confirm-btn:active { opacity: 0.7; }
.confirm-cancel { background: rgba(0,0,0,0.07); color: var(--text-secondary); }
.confirm-ok { background: var(--danger); color: #fff; }

/* ─── Action Sheet ─── */
.action-sheet {
  width: 100%;
  background: rgba(248,249,250,0.98);
  backdrop-filter: blur(30px) saturate(180%);
  border-radius: 22px 22px 0 0;
  padding: 0 0 calc(12px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.open .action-sheet { transform: translateY(0); }
.action-sheet-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 24px;
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 500;
  color: var(--text-primary);
  cursor: pointer;
  text-align: left;
  transition: background 0.12s;
}
.action-sheet-btn svg { flex-shrink: 0; }
.action-sheet-btn svg path { fill: var(--text-primary); }
.action-sheet-btn:active { background: rgba(0,0,0,0.05); }
.action-sheet-btn-danger { color: var(--danger); }
.action-sheet-btn-danger svg path { fill: var(--danger); }
.action-sheet-btn-cancel {
  color: var(--text-secondary);
  font-weight: 600;
  margin-top: 4px;
  border-top: 0.5px solid var(--border);
}
.action-sheet-btn-cancel svg { display: none; }
.action-sheet-divider {
  height: 0.5px;
  background: var(--border);
  margin: 0 24px;
}

/* ─── Shopping List Cards ─── */
.shop-card {
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.shop-card-done {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  opacity: 0.45;
  cursor: pointer;
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
}
.shop-thumb-sm { width: 32px; height: 32px; border-radius: 6px; background-size: cover; background-position: center; flex-shrink: 0; }
.shop-name-done { flex: 1; font-size: 14px; font-family: var(--mono); text-decoration: line-through; color: var(--text-secondary); }
.shop-card-body { display: flex; align-items: stretch; min-height: 208px; }
.shop-img-col {
  width: 143px;
  flex-shrink: 0;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: #F3F4F6;
}
.shop-img-col.shop-img-empty { border-right: 0.5px solid var(--border-thin); }
.shop-img-col.shop-img-empty svg path { fill: var(--text-tertiary); }
.shop-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.shop-img-del {
  position: absolute; top: 8px; right: 8px;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(0,0,0,0.55); color: #fff; border: none;
  font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.shop-card-right { flex: 1; min-width: 0; display: flex; flex-direction: column; padding: 16px 16px 14px 18px; gap: 8px; }
.shop-card-top-row { display: flex; align-items: flex-start; gap: 4px; }
.shop-name-input {
  background: none; border: none; border-bottom: 1.5px solid transparent; outline: none;
  font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--text-primary);
  flex: 1; min-width: 0; padding: 0 0 2px; transition: border-color 0.2s; line-height: 1.3;
}
.shop-name-input:focus { border-bottom-color: var(--accent); }
.shop-name-input::placeholder { color: var(--text-tertiary); font-weight: 400; font-size: 15px; }
.shop-qty-row { display: flex; align-items: center; gap: 8px; }
.shop-qty-btn {
  width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border);
  background: none; font-size: 16px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: var(--text-secondary); transition: background 0.12s; line-height: 1;
}
.shop-qty-btn:active { background: var(--accent-light); }
.shop-qty { font-size: 15px; font-weight: 700; font-family: var(--mono); min-width: 18px; text-align: center; }
.shop-del-btn { background: none; border: none; cursor: pointer; padding: 2px; opacity: 0.3; display: flex; flex-shrink: 0; transition: opacity 0.15s; margin-top: 2px; }
.shop-del-btn:active { opacity: 1; }
.shop-del-btn svg path { fill: var(--danger); }
.shop-info-lines { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.shop-info-line { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.shop-info-icon { flex-shrink: 0; display: flex; }
.shop-info-icon svg path { fill: var(--accent); }
.shop-info-text { flex: 1; font-size: 13px; font-family: var(--mono); color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.shop-info-link { color: var(--accent); }
.shop-info-clear { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 14px; padding: 0; opacity: 0.5; flex-shrink: 0; }
.shop-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
.shop-icon-btns { display: flex; gap: 6px; }
.shop-meta-icon-btn {
  background: #F3F4F6; border: none; border-radius: 8px;
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.12s;
}
.shop-meta-icon-btn:active { background: var(--accent-light); }
.shop-meta-icon-btn svg path { fill: var(--text-tertiary); }
.shop-buy-btn {
  background: none; border: 1.5px solid var(--border); border-radius: 20px;
  padding: 4px 12px; font-family: var(--mono); font-size: 12px; font-weight: 600;
  color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.shop-buy-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
[data-theme='dark'] .shop-card,
[data-theme='dark'] .shop-card-done { background: var(--surface-solid); }
[data-theme='dark'] .shop-img-col { background: rgba(255,255,255,0.06); }
[data-theme='dark'] .shop-meta-icon-btn { background: rgba(255,255,255,0.08); }

/* ═══════════════════════════════════════
   DARK THEME
═══════════════════════════════════════ */
[data-theme='dark'] {
  --bg: #0E0E10;
  --surface: rgba(28, 28, 32, 0.85);
  --surface-solid: #1C1C20;
  --border: rgba(255,255,255,0.1);
  --border-thin: rgba(255,255,255,0.07);
  --text-primary: #F2F2F7;
  --text-secondary: #8E8E93;
  --text-tertiary: #48484A;
  --accent-light: rgba(26,86,219,0.18);
  --accent-mid: rgba(26,86,219,0.28);
}
[data-theme='dark'] #tab-bar {
  background: rgba(14,14,16,0.92);
}
[data-theme='dark'] .screen { background: var(--bg); }
[data-theme='dark'] .screen-header { background: var(--bg); }
[data-theme='dark'] .day-tabs-wrap { background: var(--bg); }
[data-theme='dark'] .modal-sheet,
[data-theme='dark'] .action-sheet { background: rgba(28,28,32,0.98); }
[data-theme='dark'] .modal-input,
[data-theme='dark'] .modal-textarea { background: #2C2C2E; border-color: rgba(255,255,255,0.1); color: var(--text-primary); }
[data-theme='dark'] .expense-total-card,
[data-theme='dark'] .expense-input-card,
[data-theme='dark'] .settings-card,
[data-theme='dark'] .hotel-card { background: #1C1C20; border-color: rgba(255,255,255,0.08); }
[data-theme='dark'] .expense-input,
[data-theme='dark'] .expense-select { background: #2C2C2E; color: var(--text-primary); }
[data-theme='dark'] .expense-row { background: rgba(28,28,32,0.9); }
[data-theme='dark'] .flight-card { background: linear-gradient(140deg, #0a1830 0%, #112244 42%, #091c36 100%); }
[data-theme='dark'] .confirm-box { background: rgba(28,28,32,0.98); }

/* ═══════════════════════════════════════
   SETTINGS SCREEN
═══════════════════════════════════════ */
.settings-section { padding: 0 16px 6px; }
.settings-section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  padding: 18px 4px 8px;
}
.settings-card {
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  gap: 12px;
}
.settings-row-btn {
  width: 100%;
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--mono);
  text-align: left;
}
.settings-row-btn svg path { fill: var(--text-tertiary); }
.settings-row-danger .settings-label { color: var(--danger); }
.settings-row-danger svg path { fill: var(--danger); }
.settings-label {
  font-size: 15px;
  color: var(--text-primary);
  font-family: var(--mono);
  flex: 1;
}
.settings-input {
  background: none;
  border: none;
  outline: none;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text-secondary);
  text-align: right;
  flex: 1;
  min-width: 0;
}
.settings-input-right { text-align: right; max-width: 100px; }
.settings-currency-prefix {
  font-size: 13px;
  color: var(--text-tertiary);
  font-family: var(--mono);
  flex-shrink: 0;
}
.settings-divider {
  height: 0.5px;
  background: var(--border-thin);
  margin: 0 16px;
}
.settings-currency-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
}
.currency-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 14px 8px;
  background: none;
  border: none;
  border-right: 0.5px solid var(--border-thin);
  cursor: pointer;
  font-family: var(--mono);
  transition: background 0.15s;
}
.currency-btn:last-child { border-right: none; }
.currency-btn.active { background: var(--accent-light); }
.currency-symbol {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
}
.currency-btn.active .currency-symbol { color: var(--accent); }
.currency-label {
  font-size: 10px;
  color: var(--text-tertiary);
  letter-spacing: 0.04em;
}
.currency-btn.active .currency-label { color: var(--accent); }
.settings-theme-row {
  display: flex;
}
.settings-theme-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px;
  background: none;
  border: none;
  border-right: 0.5px solid var(--border-thin);
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s;
}
.settings-theme-btn:last-child { border-right: none; }
.settings-theme-btn.active {
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 600;
}
.settings-theme-icon { font-size: 16px; }

/* ─── Animations ─── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── Toast ─── */
#app-toast {
  position: fixed;
  bottom: calc(72px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(10,10,10,0.82);
  backdrop-filter: blur(12px);
  color: #fff;
  font-family: var(--mono);
  font-size: 13px;
  padding: 9px 18px;
  border-radius: 20px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 999;
}
#app-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Long-press ripple on day tabs */
.day-tab {
  -webkit-user-select: none;
  user-select: none;
}
.day-tab:active {
  background: var(--accent-light);
  border-radius: 8px;
}

</style>
</head>

/* ═══════════════════════════════════════
   DATA LAYER
═══════════════════════════════════════ */
const KEY = 'travel_journal_v4';
let data = {
  days: [{ banner: { date: '', subtitle: '', photos: [] }, events: [] }],
  expenses: [[]],
  flights: [],
  hotels: [],
  settings: { tripName: '', budget: 0, currency: 'TWD', theme: 'light' }
};
let currentDay = 0;
let editingEventId = null;
let _slideshowTimer = null;

/* blob URL cache：key → objectURL，session 內有效 */
const _blobCache = new Map();

function load() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) data = JSON.parse(s);
    while (data.expenses.length < data.days.length) data.expenses.push([]);
    if (!data.flights)   data.flights   = [];
    if (!data.hotels)    data.hotels    = [];
    if (!data.tickets)   data.tickets   = [];
    if (!data.checklist) data.checklist = [];
    if (!data.shopping)  data.shopping  = [];
    if (!data.notes)     data.notes     = '';
    if (!data.settings)  data.settings  = { tripName: '', budget: 0, currency: 'TWD', theme: 'light' };
    data.days.forEach(d => {
      if (!d.banner) d.banner = { date: '', subtitle: '', photos: [] };
      if (!d.banner.photos) d.banner.photos = [];
    });
  } catch(e) {}
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e) {}
}

/* ─── Utility ─── */
function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/* ═══════════════════════════════════════
   TAB NAVIGATION
═══════════════════════════════════════ */
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'expense')  renderExpense();
  if (tab === 'info')     renderInfo();
  if (tab === 'settings') renderSettings();
}

   ITINERARY
═══════════════════════════════════════ */
function renderItinerary() {
  renderDayTabs();
  renderBanner();
  renderTimeline();
}

/* ─── Custom Confirm Dialog ─── */
function showConfirm(title, msg, onOk) {
  let el = document.getElementById('app-confirm');
  if (!el) {
    el = document.createElement('div');
    el.id = 'app-confirm';
    el.innerHTML = `
      <div class="confirm-box">
        <div class="confirm-title" id="confirm-title"></div>
        <div class="confirm-msg" id="confirm-msg"></div>
        <div class="confirm-btns">
          <button class="confirm-btn confirm-cancel" id="confirm-cancel">取消</button>
          <button class="confirm-btn confirm-ok" id="confirm-ok">刪除</button>
        </div>
      </div>`;
    document.body.appendChild(el);
  }
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  el.classList.add('show');
  const ok     = document.getElementById('confirm-ok');
  const cancel = document.getElementById('confirm-cancel');
  const close  = () => el.classList.remove('show');
  ok.onclick     = () => { close(); onOk(); };
  cancel.onclick = () => close();
  el.onclick     = (e) => { if (e.target === el) close(); };
}


function deleteDay(i) {
  if (data.days.length <= 1) {
    showToast('至少保留一天');
    return;
  }
  showConfirm(`刪除 Day ${i + 1}？`, '此天的行程與帳單將一併移除。', () => {
    data.days.splice(i, 1);
    data.expenses.splice(i, 1);
    currentDay = Math.min(currentDay, data.days.length - 1);
    if (expenseDay >= data.days.length) expenseDay = data.days.length - 1;
    save();
    renderItinerary();
    renderExpenseDayTabs();
  });
}

/* ─── Toast helper ─── */
let _toastTimer = null;
function showToast(msg) {
  let el = document.getElementById('app-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'app-toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function renderDayTabs() {
  const w = document.getElementById('day-tabs');
  w.innerHTML = '';
  data.days.forEach((_, i) => {
    const b = document.createElement('button');
    b.className = 'day-tab' + (i === currentDay ? ' active' : '');
    b.textContent = i + 1;
    b.onclick = () => { currentDay = i; renderItinerary(); };

    // Long-press to delete
    let pressTimer = null;
    b.addEventListener('pointerdown', () => {
      pressTimer = setTimeout(() => {
        pressTimer = null;
        deleteDay(i);
      }, 600);
    });
    b.addEventListener('pointerup',    () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
    b.addEventListener('pointerleave', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });

    w.appendChild(b);
  });
}

  area.innerHTML = `

        <input class="banner-date-input" id="banner-date-live"

        <input class="banner-subtitle-input" id="banner-sub-live"

        <svg xmlns="http://www.w3.org/2000/svg" height="22px" viewBox="0 -960 960 960" width="22px" fill="rgba(255,255,255,0.9)">
          <path d="M480-160q-33 0-56.5-23.5T400-240q0-33 23.5-56.5T480-320q33 0 56.5 23.5T560-240q0 33-23.5 56.5T480-160Zm0-240q-33 0-56.5-23.5T400-480q0-33 23.5-56.5T480-560q33 0 56.5 23.5T560-480q0 33-23.5 56.5T480-400Zm0-240q-33 0-56.5-23.5T400-720q0-33 23.5-56.5T480-800q33 0 56.5 23.5T560-720q0 33-23.5 56.5T480-640Z"/>
        </svg>
      </button>
      ${dots}
    </div>`;

  // auto slideshow — clear old timer first to prevent leaks
  if (_slideshowTimer) { clearInterval(_slideshowTimer); _slideshowTimer = null; }
  if (photos.length > 1) {
    let idx = 0;
    const slides  = area.querySelector('#banner-slides');
    const dotEls  = area.querySelectorAll('.banner-dot');
    _slideshowTimer = setInterval(() => {
      idx = (idx + 1) % photos.length;
      slides.style.transform = `translateX(-${idx * 100}%)`;
      dotEls.forEach((d, i) => d.classList.toggle('active', i === idx));
    }, 3500);
  }
}

function saveBannerText() {
  const d   = document.getElementById('banner-date-live');
  const s   = document.getElementById('banner-sub-live');
  if (!d || !s) return;
  const dayIdx = parseInt(d.dataset.day ?? currentDay);
  if (isNaN(dayIdx) || !data.days[dayIdx]) return;
  data.days[dayIdx].banner.date     = d.value;
  data.days[dayIdx].banner.subtitle = s.value;
  // 填入日期後推算所有空白天
  inferAllDates();
  save();
  // 重新 render tabs（日期可能更新了）
  renderDayTabs();
  renderExpenseDayTabs();
}

function renderTimeline() {
  const list = document.getElementById('timeline-list');
  const evs  = [...(data.days[currentDay].events || [])].sort((a, b) => a.time.localeCompare(b.time));
  if (!evs.length) {
    list.innerHTML = `<div class="timeline-empty">尚無行程</div>`;
    return;
  }
  list.innerHTML = evs.map((ev, i) => `
    <div class="timeline-item" style="animation-delay:${i * 0.05}s">
      <div class="timeline-left">
        <div class="timeline-dot"></div>
        <div class="timeline-line"></div>
      </div>
      <div class="timeline-right">
        <div class="timeline-time">
          <span>${ev.time}</span>
          <div class="timeline-actions">
            <button class="t-action-btn" onclick="editEvent(${ev.id})">${EDIT_SVG}</button>
            <button class="t-action-btn del" onclick="deleteEvent(${ev.id})">${DEL_SVG}</button>
          </div>
        </div>
        <div class="timeline-title">${esc(ev.title)}</div>
        ${ev.note ? `<div class="timeline-note">${esc(ev.note)}</div>` : ''}
      </div>
    </div>`).join('');
}

/* ─── Date Auto-format: digits → YYYY/MM/DD（weekday） ─── */
const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];

function fmtDate(el) {
  let digits = el.value.replace(/\D/g, '').slice(0, 8);
  let out = '';
  if (digits.length <= 4) {
    out = digits;
  } else if (digits.length <= 6) {
    out = digits.slice(0, 4) + '/' + digits.slice(4);
  } else {
    out = digits.slice(0, 4) + '/' + digits.slice(4, 6) + '/' + digits.slice(6);
  }
  if (digits.length === 8) {
    const y  = parseInt(digits.slice(0, 4));
    const m  = parseInt(digits.slice(4, 6)) - 1;
    const d  = parseInt(digits.slice(6, 8));
    const dt = new Date(y, m, d);
    if (!isNaN(dt.getTime())) {
      out += '（' + WEEKDAYS[dt.getDay()] + '）';
    }
  }
  el.value = out;
}

/* parse "YYYY/MM/DD…" → Date or null */
function parseBannerDate(str) {
  const m = String(str || '').match(/(\d{4})\/(\d{2})\/(\d{2})/);
  if (!m) return null;
  return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
}

/* ─── Date helpers ─── */
function dateToStr(dt) {
  const y  = dt.getFullYear();
  const mo = String(dt.getMonth() + 1).padStart(2, '0');
  const d  = String(dt.getDate()).padStart(2, '0');
  const wd = WEEKDAYS[dt.getDay()];
  return `${y}/${mo}/${d}（${wd}）`;
}

/* 從任一已知天推算所有空白天的日期 */
function inferAllDates() {
  // 找第一個有日期的 anchor
  let anchorIdx = -1;
  let anchorDate = null;
  for (let i = 0; i < data.days.length; i++) {
    const d = parseBannerDate(data.days[i].banner.date);
    if (d) { anchorIdx = i; anchorDate = d; break; }
  }
  if (anchorIdx === -1) return; // 沒有任何日期，無法推算

  // 往前推
  for (let i = anchorIdx - 1; i >= 0; i--) {
    if (!parseBannerDate(data.days[i].banner.date)) {
      const dt = new Date(anchorDate);
      dt.setDate(dt.getDate() - (anchorIdx - i));
      data.days[i].banner.date = dateToStr(dt);
    }
  }
  // 往後推
  for (let i = anchorIdx + 1; i < data.days.length; i++) {
    if (!parseBannerDate(data.days[i].banner.date)) {
      const dt = new Date(anchorDate);
      dt.setDate(dt.getDate() + (i - anchorIdx));
      data.days[i].banner.date = dateToStr(dt);
    }
  }
}

/* resolve stored value → displayable URL */
function resolvePhoto(val) {
  if (!val) return '';
  if (val.startsWith('blob-key:')) return _blobCache.get(val) || '';
  return val;
}

function addDay() {
  // 先找最後一個有日期的天往後推一天
  let nextDate = '';
  for (let i = data.days.length - 1; i >= 0; i--) {
    const d = parseBannerDate(data.days[i].banner.date);
    if (d) {
      d.setDate(d.getDate() + (data.days.length - i));
      nextDate = dateToStr(d);
      break;
    }
  }
  data.days.push({ banner: { date: nextDate, subtitle: '', photos: [] }, events: [] });
  data.expenses.push([]);
  currentDay = data.days.length - 1;
  save();
  renderItinerary();
  const etabs = document.getElementById('expense-day-tabs');
  if (etabs) renderExpenseDayTabs();
}

/* ─── Event Modal ─── */
function openEventModal(id) {
  editingEventId = id !== undefined ? id : null;
  document.getElementById('modal-event-title').textContent = id !== undefined ? '編輯行程' : '新增行程';
  if (id !== undefined) {
    const ev = data.days[currentDay].events.find(e => e.id === id);
    document.getElementById('ev-time').value  = ev.time;
    document.getElementById('ev-title').value = ev.title;
    document.getElementById('ev-note').value  = ev.note || '';
  } else {
    document.getElementById('ev-time').value  = '';
    document.getElementById('ev-title').value = '';
    document.getElementById('ev-note').value  = '';
  }
  document.getElementById('modal-event').classList.add('open');
  setTimeout(() => document.getElementById('ev-title').focus(), 340);
}

function editEvent(id)   { openEventModal(id); }

function deleteEvent(id) {
  data.days[currentDay].events = data.days[currentDay].events.filter(e => e.id !== id);
  save();
  renderTimeline();
}

function saveEvent() {
  const time  = document.getElementById('ev-time').value;
  const title = document.getElementById('ev-title').value.trim();
  if (!time || !title) return;
  const note = document.getElementById('ev-note').value.trim();
  if (editingEventId !== null) {
    const ev = data.days[currentDay].events.find(e => e.id === editingEventId);
    if (ev) { ev.time = time; ev.title = title; ev.note = note; }
  } else {
    data.days[currentDay].events.push({ id: Date.now(), time, title, note });
  }
  save();
  closeModal('modal-event');
  renderTimeline();
}

function removeBannerPhoto(idx) {
  data.days[currentDay].banner.photos.splice(idx, 1);
  renderPhotoGrid();
}

function handleGridUpload(input) {
  const files = [...input.files];
  const photos = data.days[currentDay].banner.photos || [];
  const remaining = 5 - photos.length;
  files.slice(0, remaining).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result;
      const key = `blob-key:${Date.now()}-${Math.random().toString(36).slice(2)}|${file.name}`;
      _blobCache.set(key, base64);
      data.days[currentDay].banner.photos.push(key);
      renderPhotoGrid();
    };
    reader.readAsDataURL(file);
  });
}

function changeShopQty(i, delta) {
  if (!data.shopping[i]) return;

function handleShopPhoto(input, i) {
  const file = input.files[0];

  const reader = new FileReader();

    _blobCache.set(key, e.target.result);
    data.shopping[i].photo = key;
    save(); renderShopItems();

  reader.readAsDataURL(file);
}

function handleTicketPhoto(input, id) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const key = `blob-key:${Date.now()}|${file.name}`;
    _blobCache.set(key, e.target.result);
    const t = data.tickets.find(t => t.id === id);
    if (t) { t.photo = key; save(); renderTicketCards(); }
  };
  reader.readAsDataURL(file);
}

function addTicketFromPhoto(input) {
  const files = [...input.files];
  if (!data.tickets) data.tickets = [];
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const key = `blob-key:${Date.now()}-${Math.random().toString(36).slice(2)}|${file.name}`;
      _blobCache.set(key, e.target.result);
      data.tickets.push({ id: Date.now() + Math.random(), photo: key });
      save();
      renderTicketCards();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

/* ─── Hotel Bottom Sheet ─── */
let _hotelEditId = null;
let _sheetBreakfast = false;

function openHotelSheet(editId) {
  _hotelEditId = editId || null;
  _sheetBreakfast = false;
  // clear fields
  ['hf-name','hf-checkin','hf-checkout','hf-addr','hf-ref','hf-price'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  if (editId) {
    const h = data.hotels.find(h => h.id === editId);
    if (h) {
      document.getElementById('hf-name').value     = h.name    || '';
      document.getElementById('hf-checkin').value  = h.checkin || '';
      document.getElementById('hf-checkout').value = h.checkout|| '';
      document.getElementById('hf-addr').value     = h.addr    || '';
      document.getElementById('hf-ref').value      = h.ref     || '';
      document.getElementById('hf-price').value    = h.price   || '';
      _sheetBreakfast = h.breakfast || false;
    }
  }
  const tog = document.getElementById('hf-breakfast-toggle');
  const lbl = document.getElementById('hf-breakfast-label');
  if (tog) tog.classList.toggle('on', _sheetBreakfast);
  if (lbl) lbl.textContent = _sheetBreakfast ? '含早餐' : '不含';
  document.getElementById('hotel-sheet-save-btn').textContent = editId ? '更新' : '儲存';
  updateHotelPreview();
  document.getElementById('modal-hotel-sheet').classList.add('open');
  setTimeout(() => document.getElementById('hf-name').focus(), 340);
}

function toggleSheetBreakfast() {
  _sheetBreakfast = !_sheetBreakfast;
  const tog = document.getElementById('hf-breakfast-toggle');
  const lbl = document.getElementById('hf-breakfast-label');
  if (tog) tog.classList.toggle('on', _sheetBreakfast);
  if (lbl) lbl.textContent = _sheetBreakfast ? '含早餐' : '不含';
  updateHotelPreview();
}

function fmtHotelDate(el) {
  let v = el.value.replace(/\D/g, '').slice(0, 4);
  if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
  el.value = v;
}

function fmtHotelPrice(el) {
  const raw = el.value.replace(/[^0-9]/g, '');
  if (raw) el.value = parseInt(raw).toLocaleString();
  else el.value = '';
}

function calcNights(checkin, checkout) {
  const parse = s => {
    const m = String(s||'').match(/(\d{1,2})\/(\d{1,2})/);
    if (!m) return null;
    return new Date(new Date().getFullYear(), parseInt(m[1])-1, parseInt(m[2]));
  };
  const a = parse(checkin), b = parse(checkout);
  if (!a || !b) return 0;
  const diff = Math.round((b - a) / 86400000);
  return diff > 0 ? diff : 0;
}

function hotelDateWithDay(str) {
  const m = String(str||'').match(/(\d{1,2})\/(\d{1,2})/);
  if (!m) return str || '';
  const dt = new Date(new Date().getFullYear(), parseInt(m[1])-1, parseInt(m[2]));
  const wd = ['日','一','二','三','四','五','六'][dt.getDay()];
  return `${m[1]}/${m[2]}（${wd}）`;
}

function updateHotelPreview() {
  const name     = document.getElementById('hf-name')?.value || '';
  const checkin  = document.getElementById('hf-checkin')?.value || '';
  const checkout = document.getElementById('hf-checkout')?.value || '';
  const addr     = document.getElementById('hf-addr')?.value || '';
  const ref      = document.getElementById('hf-ref')?.value || '';
  const price    = document.getElementById('hf-price')?.value || '';
  const nights   = calcNights(checkin, checkout);
  const sym      = getCurrencySymbol();

  const datesEl  = document.getElementById('hp-dates');
  const nightsEl = document.getElementById('hp-nights');
  const nameEl   = document.getElementById('hp-name');
  const subEl    = document.getElementById('hp-sub');
  const metaEl   = document.getElementById('hp-meta');
  if (!datesEl) return;

  const ci = hotelDateWithDay(checkin);
  const co = hotelDateWithDay(checkout);
  datesEl.textContent  = (checkin || checkout) ? `${ci} → ${co}` : 'MM/DD — MM/DD';
  nightsEl.textContent = nights > 0 ? `${nights} 晚` : '';
  nameEl.textContent   = name || '飯店名稱';
  subEl.textContent    = addr || '';

  let meta = [];
  if (_sheetBreakfast) meta.push('含早餐');
  if (ref)   meta.push(`訂房編號 ${ref}`);
  if (price) meta.push(`${sym} ${price}`);
  metaEl.innerHTML = meta.map(m => `<span class="hp-meta-tag">${esc(m)}</span>`).join('');
}

function saveHotelSheet() {
  const name     = document.getElementById('hf-name').value.trim();
  const checkin  = document.getElementById('hf-checkin').value.trim();
  const checkout = document.getElementById('hf-checkout').value.trim();
  const addr     = document.getElementById('hf-addr').value.trim();
  const ref      = document.getElementById('hf-ref').value.trim();
  const price    = document.getElementById('hf-price').value.replace(/[^0-9]/g,'');
  const nights   = calcNights(checkin, checkout);

  if (_hotelEditId) {
    const h = data.hotels.find(h => h.id === _hotelEditId);
    if (h) Object.assign(h, { name, checkin, checkout, addr, ref, price, nights, breakfast: _sheetBreakfast });
  } else {
    data.hotels.push({ id: Date.now(), name, checkin, checkout, addr, ref, price, nights, breakfast: _sheetBreakfast });
  }
  save();
  closeModal('modal-hotel-sheet');
  renderHotelCards();
}

function deleteHotelCard(id) {
  data.hotels = data.hotels.filter(h => h.id !== id);
  save(); renderHotelCards();
}

function renderHotelCards() {
  const sym = getCurrencySymbol();
  const el  = document.getElementById('hotel-cards');
  if (!data.hotels.length) {
    el.innerHTML = `<div class="list-empty">點右上角 ＋ 新增住宿</div>`;
    return;
  }
  el.innerHTML = data.hotels.map(h => {
    const ci = hotelDateWithDay(h.checkin);
    const co = hotelDateWithDay(h.checkout);
    const nights = h.nights || calcNights(h.checkin, h.checkout);
    const priceDisplay = h.price ? `${sym} ${parseInt(h.price).toLocaleString()}` : '';

    return `
    <div class="hotel-card" onclick="openHotelSheet(${h.id})">
      <div class="hotel-card-header2">
        <div class="hotel-dates-large2">${ci ? `${ci} → ${co}` : '日期未設定'}</div>
        <div class="hotel-nights-pill">${nights > 0 ? `${nights} 晚` : ''}</div>
      </div>
      <div class="hotel-name2">${esc(h.name || '未命名')}</div>
      ${h.addr ? `<div class="hotel-addr2">📍 ${esc(h.addr)}</div>` : ''}
      <div class="hotel-meta2">
        ${h.breakfast ? `<span class="hotel-meta2-tag breakfast">含早餐</span>` : ''}
        ${h.ref ? `<span class="hotel-meta2-tag">訂房 ${esc(h.ref)}</span>` : ''}
      </div>
      ${priceDisplay ? `<div class="hotel-price2">
        <span class="hotel-price2-label">總價</span>
        <span class="hotel-price2-val">${priceDisplay}</span>
        <button class="hotel-del-fab" onclick="event.stopPropagation();deleteHotelCard(${h.id})">${DEL_SVG}</button>
      </div>` : `<div style="text-align:right;padding-top:8px">
        <button class="hotel-del-fab" onclick="event.stopPropagation();deleteHotelCard(${h.id})">${DEL_SVG}</button>
      </div>`}
    </div>`;
  }).join('');
}

  { code: 'JPY', symbol: '¥',   label: '日圓'   },
  { code: 'CNY', symbol: 'CN¥', label: '人民幣' },

  const grid = document.getElementById('currency-grid');

}

}

function setTheme(mode) {
  data.settings.theme = mode;
  save();
  applyTheme(mode);
  renderSettings();
}

function applyTheme(mode) {
  document.documentElement.setAttribute('data-theme', mode);
}

function getCurrencySymbol() {
  const c = CURRENCIES.find(c => c.code === (data.settings?.currency || 'TWD'));
  return c ? c.symbol : 'NT$';
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `travel-journal-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('已匯出 JSON');
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.days) throw new Error('格式錯誤');
      showConfirm('匯入資料', '現有資料將被覆蓋，確定繼續？', () => {
        data = imported;
        if (!data.settings) data.settings = { tripName: '', budget: 0, currency: 'TWD', theme: 'light' };
        save();
        renderItinerary();
        renderExpense();
        renderSettings();
        showToast('匯入成功');
      });
    } catch {
      showToast('檔案格式錯誤');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function clearAllData() {
  showConfirm('清除所有資料', '所有行程、帳單、資訊將永久刪除。', () => {
    data = {
      days: [{ banner: { date: '', subtitle: '', photos: [] }, events: [] }],
      expenses: [[]],
      flights: [],
      hotels: [],
      settings: { tripName: '', budget: 0, currency: 'TWD', theme: 'light' }
    };
    currentDay  = 0;
    expenseDay  = 0;
    save();
    renderItinerary();
    renderExpense();
    renderSettings();
    switchTab('itinerary');
    showToast('已清除所有資料');
  });
}
