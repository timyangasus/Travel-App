<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="旅遊誌">
  <meta name="theme-color" content="#111111">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <title>旅遊誌</title>
  <style>
/* ═══════════════════════════════════════
   旅遊誌 — Global Styles
   style.css
═══════════════════════════════════════ */

/* ─── Reset ─── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

/* ─── Design Tokens ─── */
:root {
  --bg: #fff;
  --surface: rgba(255, 255, 255, 0.72);
  --surface-solid: #fff;
  --border: rgba(0, 0, 0, 0.08);
  --border-thin: rgba(0, 0, 0, 0.06);
  --text-primary: #0A0A0A;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;
  --accent: #1A56DB;
  --accent-light: rgba(26, 86, 219, 0.08);
  --accent-mid: rgba(26, 86, 219, 0.15);
  --danger: #EF4444;
  --mono: 'SF Mono', 'SFMono-Regular', ui-monospace, 'Menlo', 'Monaco', 'Courier New', monospace;
  --radius: 0px;
  --radius-sm: 0px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

/* ─── Base ─── */
html, body {
  height: 100%;
  width: 100%;
  background: var(--bg);
  font-family: var(--mono);
  color: var(--text-primary);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  width: 100%;
  position: relative;
  overflow: hidden;
}
* { scrollbar-width: none; }
*::-webkit-scrollbar { display: none; }

/* ─── Tab Bar ─── */
#tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(56px + var(--safe-bottom));
  background: rgba(248, 249, 250, 0.92);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-top: 0.5px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-around;
  padding-top: 10px;
  z-index: 100;
}
.tab-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 24px;
  min-width: 80px;
  font-family: var(--mono);
}
.tab-icon svg { width: 24px; height: 24px; display: block; }
.tab-icon svg path { transition: fill 0.2s; fill: #9CA3AF; }
.tab-btn.active .tab-icon svg path { fill: #1A56DB; }
.tab-label {
  font-size: 10px;
  letter-spacing: 0.02em;
  font-weight: 600;
  color: #9CA3AF;
  transition: color 0.2s;
}
.tab-btn.active .tab-label { color: #1A56DB; }

/* ─── Screens ─── */
.screen {
  position: absolute;
  inset: 0;
  padding-bottom: calc(56px + var(--safe-bottom));
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  display: none;
  background: var(--bg);
}
.screen.active { display: block; }

/* ═══════════════════════════════════════
   ITINERARY SCREEN
═══════════════════════════════════════ */
#screen-itinerary { padding-bottom: calc(64px + var(--safe-bottom)); }

/* Banner */
.day-banner {
  position: relative;
  width: 100%;
  height: 100vw;
  background: #0f2152;
  overflow: hidden;
}
.banner-slides-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
}
.banner-slide {
  flex-shrink: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
}
.banner-placeholder-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(145deg, #0f2152 0%, #1a3a6b 50%, #0d2847 100%);
}
.banner-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0.06) 0%,
    rgba(0, 0, 0, 0.18) 35%,
    rgba(0, 0, 0, 0.65) 100%
  );
  pointer-events: none;
}
.banner-text-area {
  position: absolute;
  bottom: 0; left: 0; right: 52px;
  padding: 0 20px 24px;
  z-index: 2;
}
.banner-trip-name {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.banner-date-input {
  display: block;
  font-family: var(--mono);
  font-size: 27px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
  line-height: 1.2;
  text-shadow: 0 1px 10px rgba(0, 0, 0, 0.5);
  background: transparent;
  border: none;
  border-bottom: 1.5px solid transparent;
  outline: none;
  width: 100%;
  caret-color: rgba(255, 255, 255, 0.9);
  transition: border-color 0.2s;
}
.banner-date-input::placeholder { color: rgba(255, 255, 255, 0.32); }
.banner-date-input:focus { border-bottom-color: rgba(255, 255, 255, 0.35); }
.banner-subtitle-input {
  display: block;
  font-family: var(--mono);
  font-size: 13px;
  color: rgba(255, 255, 255, 0.82);
  background: transparent;
  border: none;
  border-bottom: 1.5px solid transparent;
  outline: none;
  width: 100%;
  margin-top: 6px;
  caret-color: rgba(255, 255, 255, 0.8);
  line-height: 1.5;
  transition: border-color 0.2s;
}
.banner-subtitle-input::placeholder { color: rgba(255, 255, 255, 0.28); }
.banner-subtitle-input:focus { border-bottom-color: rgba(255, 255, 255, 0.25); }
.banner-photo-btn {
  position: absolute;
  top: calc(var(--safe-top) + 14px);
  right: 14px;
  z-index: 3;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(10px);
  border: 0.5px solid rgba(255, 255, 255, 0.18);
  border-radius: 50%;
  padding: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.banner-dots {
  position: absolute;
  bottom: 10px; right: 20px;
  display: flex;
  gap: 5px;
  z-index: 3;
}
.banner-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.45);
  transition: background 0.3s, width 0.3s;
}
.banner-dot.active { background: #fff; width: 14px; border-radius: 0; }

/* Day Tabs */
.day-tabs-wrap {
  padding: 0 16px;
  background: var(--bg);
  border-bottom: 0.5px solid var(--border-thin);
  position: sticky;
  top: 0;
  z-index: 10;
}
.day-tabs-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0 0;
}
.day-tabs-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--text-tertiary);
  text-transform: uppercase;
}
.day-tabs-add-event {
  background: none;
  border: none;
  font-size: 22px;
  color: var(--accent);
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  font-family: var(--mono);
  transition: opacity 0.15s;
}
.day-tabs-add-event:active { opacity: 0.5; }
  background: none;
  border: none;
  cursor: pointer;
  color: var(--accent);
  font-size: 24px;
  line-height: 1;
  padding: 0 2px;
  font-weight: 700;
}
.day-tabs { display: flex; overflow-x: auto; }
.day-tab {
  flex-shrink: 0;
  min-width: 40px;
  padding: 10px 14px 12px;
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 600;
  color: var(--text-tertiary);
  position: relative;
  transition: color 0.2s;
}
.day-tab.active { color: var(--accent); }
.day-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 8px; right: 8px;
  height: 2px;
  background: var(--accent);
  border-radius: 0;
}

/* Timeline */
.timeline-section { padding: 16px 16px 80px; position: relative; }
.timeline-add-fab { display: none; }
.timeline { position: relative; }
.timeline-item {
  display: flex;
  gap: 12px;
  position: relative;
  animation: fadeInUp 0.22s ease both;
}
.timeline-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 20px;
  flex-shrink: 0;
  padding-top: 3px;
}
.timeline-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  z-index: 1;
}
.timeline-line {
  width: 1.5px;
  flex: 1;
  min-height: 16px;
  background: linear-gradient(to bottom, var(--accent-mid) 0%, transparent 100%);
  margin-top: 4px;
}
.timeline-item:last-child .timeline-line { display: none; }
.timeline-right { flex: 1; padding-bottom: 24px; min-width: 0; }
.timeline-time-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 3px;
}
.timeline-time {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.02em;
  line-height: 1;
}
.t-del-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: var(--text-tertiary);
  padding: 0 2px;
  line-height: 1;
  opacity: 0.5;
  transition: opacity 0.15s, color 0.15s;
  flex-shrink: 0;
}
.t-del-btn:active { opacity: 1; color: var(--danger); }
.timeline-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.2px;
  word-break: break-word;
  white-space: pre-wrap;
  cursor: pointer;
  padding-right: 0;
}
.timeline-title:active { opacity: 0.7; }
.timeline-note {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 5px;
  line-height: 1.65;
  word-break: break-word;
  white-space: pre-wrap;
  padding-right: 40%;
}
.timeline-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-tertiary);
  font-size: 13px;
}

/* ═══════════════════════════════════════
   EXPENSE SCREEN
═══════════════════════════════════════ */
.screen-header {
  padding: calc(var(--safe-top) + 14px) 0 0;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 0.5px solid var(--border-thin);
}
.screen-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.expense-day-selector {
  display: flex;
  overflow-x: auto;
  padding: 0 16px;
}
.expense-total-card {
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.expense-total-label {
  font-size: 13px;
  color: var(--text-secondary);
  font-family: var(--mono);
}
.expense-total-sub {
  font-size: 12px;
  color: var(--text-tertiary);
  font-family: var(--mono);
  margin-top: 3px;
}
.expense-total-amount {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -1.5px;
  color: var(--accent);
  font-family: var(--mono);
  line-height: 1;
}
.expense-trip-total-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  justify-content: flex-end;
}
.expense-trip-label {
  font-size: 11px;
  color: var(--text-tertiary);
  font-family: var(--mono);
  letter-spacing: 0.04em;
}
.expense-trip-amount {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  font-family: var(--mono);
}
.expense-row-cat-only {
  color: var(--text-secondary);
  font-weight: 500;
}

.expense-input-card {
  margin: 0 16px 28px;
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 16px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  position: relative;
}
.expense-add-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
.expense-add-row:last-of-type { margin-bottom: 0; }
.expense-header-total {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  font-family: var(--mono);
  opacity: 0.8;
}
.expense-input {
  background: #F3F4F6;
  border: none;
  border-radius: var(--radius-sm);
  padding: 14px 14px;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text-primary);
  outline: none;
  transition: background 0.15s;
  height: 52px;
  box-sizing: border-box;
  flex: 1;
}
.expense-input:focus { background: #E9EBF0; }
.expense-input::placeholder { color: var(--text-tertiary); font-family: var(--mono); }
.exp-cat-wrap { position: relative; flex: 1; }
.expense-cat-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  text-align: left;
  background: #F3F4F6;
  border: none;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text-primary);
}
.exp-cat-icon-slot { display: flex; align-items: center; flex-shrink: 0; width: 20px; }
.exp-cat-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  z-index: 200;
  min-width: 160px;
  overflow: hidden;
}
.exp-cat-dropdown.open { display: block; }
.exp-cat-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text-primary);
  transition: background 0.1s;
}
.exp-cat-option:active { background: var(--accent-light); }
.exp-cat-opt-icon { display: flex; align-items: center; flex-shrink: 0; }
.exp-cat-opt-label { flex: 1; }
.expense-input-amount { flex: 1; }
.exp-name-input { flex: 1; width: 100%; }
.expense-submit-btn {
  position: absolute;
  bottom: -20px;
  right: 20px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(26,86,219,0.35);
  transition: transform 0.15s, opacity 0.15s;
}
.expense-submit-btn:active { transform: scale(0.92); opacity: 0.85; }
.expense-list { padding: 8px 16px 20px; }
.expense-section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  padding: 4px 0 10px;
}
.expense-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.75);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  animation: fadeInUp 0.2s ease both;
}
.expense-row-icon { font-size: 20px; flex-shrink: 0; }
.expense-row-name { flex: 1; font-size: 14px; font-weight: 600; font-family: var(--mono); }
.expense-row-amount { font-size: 15px; font-weight: 700; color: var(--accent); min-width: 60px; text-align: right; font-family: var(--mono); }
.expense-row-del {
  background: none;
  border: none;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  cursor: pointer;
  padding: 2px;
}
.expense-row-del svg { width: 20px; height: 20px; }
.expense-row-del svg path { fill: #9CA3AF; }

/* ═══════════════════════════════════════
   INFO SCREEN
═══════════════════════════════════════ */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  background: transparent;
  border: none;
  border-radius: 0;
  margin: 16px auto 0;
  max-width: 360px;
  overflow: visible;
}
.info-grid-btn {
  background: transparent;
  border: none;
  aspect-ratio: unset;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 10px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: #1A1A1A;
  letter-spacing: -0.2px;
  transition: opacity 0.12s;
  padding: 28px 16px 24px;
}
.info-grid-btn:active { opacity: 0.5; }
.info-grid-icon {
  width: 75px;
  height: 75px;
  display: flex;
  align-items: center;
  justify-content: center;
}
[data-theme='dark'] .info-grid-btn { color: var(--text-primary); }
[data-theme='dark'] .info-grid-btn svg path,
[data-theme='dark'] .info-grid-btn svg rect,
[data-theme='dark'] .info-grid-btn svg circle { fill: var(--text-primary) !important; }

/* Sub-screens */
.screen-sub { display: none; }
.screen-sub.active { display: block; }
.sub-header {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 8px 0 4px !important;
}
.sub-back-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 10px 8px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  margin-top: calc(var(--safe-top) + 10px);
}
.sub-back-btn svg path { fill: var(--accent); }
.sub-header .screen-title { padding: calc(var(--safe-top) + 10px) 0 0 !important; }

.info-section { padding: 12px 16px 20px; }
#screen-info-flight .info-section { padding: 0; }
#screen-info-hotel .info-section { padding: 0; }
#screen-info,
#screen-info-flight,
#screen-info-hotel,
#screen-info-checklist,
#screen-info-shopping,
#screen-info-ticket,
#screen-info-notes { background: #fff; }

/* Checklist & Shopping */
.checklist-add-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
/* ─── Checklist (new) ─── */
.cl-group { margin-bottom: 40px; }
.cl-group:first-child { margin-top: 30px; }
.cl-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px 16px;
}
.cl-group-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-primary);
  font-family: var(--mono);
}
.cl-group-add {
  font-size: 24px;
  font-weight: 400;
  color: var(--accent);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  font-family: var(--mono);
  transition: opacity 0.15s;
}
.cl-group-add:active { opacity: 0.5; }
.cl-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 8px 20px;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
  transition: background 0.1s;
}
.cl-row:active { background: rgba(0,0,0,0.03); }
.cl-circle {
  width: 24px; height: 24px;
  border: 1.5px solid #C0C0C0;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
}
.cl-circle.cl-checked { background: var(--text-primary); border-color: var(--text-primary); }
.cl-text {
  flex: 1;
  font-size: 17px;
  font-weight: 500;
  font-family: var(--mono);
  color: var(--text-primary);
}
.cl-row.cl-done .cl-text { color: var(--text-tertiary); text-decoration: line-through; }
.cl-del {
  background: none; border: none; cursor: pointer;
  font-size: 18px; color: var(--text-tertiary);
  padding: 0; opacity: 0.5; line-height: 1;
  flex-shrink: 0;
}
.cl-del:active { opacity: 1; color: var(--danger); }
.list-empty { text-align: center; padding: 40px 0; color: var(--text-tertiary); font-size: 13px; font-family: var(--mono); }


.sub-header-action {
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  display: flex;
  align-items: center;
  margin-top: calc(var(--safe-top) + 8px);
  border-radius: 0;
  transition: background 0.12s;
}
.sub-header-action svg path { fill: var(--accent); }
.sub-header-action:active { background: var(--accent-light); }

.fc-no { font-size: 20px; font-weight: 900; color: var(--text-primary); font-family: var(--mono); letter-spacing: -0.5px; }
.fc-del { background: none; border: none; font-size: 18px; color: var(--text-tertiary); cursor: pointer; padding: 0 2px; opacity: 0.5; transition: opacity 0.15s, color 0.15s; }
.fc-del:active { opacity: 1; color: var(--danger); }
.fc-divider { height: 0.5px; background: var(--border); margin: 12px 0; }

.fc-right { text-align: right; margin-left: auto; }
.fc-mid { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.fc-duration { font-size: 11px; color: var(--text-tertiary); font-family: var(--mono); }
.fc-line { display: flex; align-items: center; width: 100%; gap: 3px; }

.fc-code { font-size: 14px; font-weight: 700; font-family: var(--mono); color: var(--text-primary); }

[data-theme='dark'] .hotel-card2 { background: var(--surface-solid); }
  display: flex;
  align-items: center;

}
.hotel-time-item { display: flex; flex-direction: column; gap: 2px; flex: 1; }

.hotel-info-rows { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }

.hotel-footer { margin-top: 10px; }

}

.hotel-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0; }
.hotel-dates-large { display: flex; align-items: baseline; flex-wrap: wrap; gap: 2px; flex: 1; }

/* ═══════════════════════════════════════
   MODALS
═══════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(5px);
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  width: 100%;
  max-height: 92vh;
  background: rgba(248,249,250,0.98);
  backdrop-filter: blur(30px) saturate(180%);
  border-radius: 0;
  padding: 0 0 calc(20px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; border-radius: 0; background: rgba(0,0,0,0.14); margin: 10px auto 0; }
.modal-title { font-size: 17px; font-weight: 700; text-align: center; padding: 14px 20px 0; letter-spacing: -0.3px; }
.modal-body { padding: 16px 20px; }
.modal-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 6px;
  margin-top: 14px;
}
.modal-label:first-child { margin-top: 0; }
.modal-input {
  width: 100%;
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s;
}
.modal-input:focus { border-color: var(--accent); }
.modal-input::placeholder { color: var(--text-tertiary); }
.modal-textarea {
  width: 100%;
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-primary);
  outline: none;
  resize: none;
  min-height: 80px;
  transition: border-color 0.2s;
  line-height: 1.65;
}
.modal-textarea:focus { border-color: var(--accent); }
.modal-btn-row { display: flex; gap: 10px; margin-top: 20px; }
.modal-btn {
  flex: 1;
  padding: 14px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.modal-btn:active { opacity: 0.75; }
.modal-btn-cancel { background: rgba(0,0,0,0.07); color: var(--text-secondary); }
.modal-btn-save { background: #000; color: #fff; }
/* ─── Photo Grid ─── */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.photo-cell {
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  overflow: hidden;
  position: relative;
}
.photo-cell-filled {
  background-size: cover;
  background-position: center;
  background-color: #F3F4F6;
}
.photo-cell-del {
  position: absolute;
  top: 6px; right: 6px;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  color: #fff;
  border: none;
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.photo-cell-add {
  background: #F3F4F6;

/* ─── Custom Confirm Dialog ─── */
#app-confirm {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
}
#app-confirm.show {
  opacity: 1;
  pointer-events: all;
}
.confirm-box {
  background: rgba(248,249,250,0.98);
  backdrop-filter: blur(30px);
  border-radius: 0;
  padding: 24px 24px 16px;
  width: min(320px, calc(100vw - 48px));
  transform: scale(0.94);
  transition: transform 0.18s cubic-bezier(0.4,0,0.2,1);
}
#app-confirm.show .confirm-box {
  transform: scale(1);
}
.confirm-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}
.confirm-msg {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 20px;
}
.confirm-btns {
  display: flex;
  gap: 10px;
}
.confirm-btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;

}
.confirm-btn:active { opacity: 0.7; }
.confirm-cancel { background: rgba(0,0,0,0.07); color: var(--text-secondary); }
.confirm-ok { background: var(--danger); color: #fff; }

/* ─── Action Sheet ─── */
.action-sheet {
  width: 100%;
  background: rgba(248,249,250,0.98);
  backdrop-filter: blur(30px) saturate(180%);
  border-radius: 0;
  padding: 0 0 calc(12px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.open .action-sheet { transform: translateY(0); }
.action-sheet-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 24px;
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 500;
  color: var(--text-primary);
  cursor: pointer;
  text-align: left;
  transition: background 0.12s;
}
.action-sheet-btn svg { flex-shrink: 0; }
.action-sheet-btn svg path { fill: var(--text-primary); }
.action-sheet-btn:active { background: rgba(0,0,0,0.05); }
.action-sheet-btn-danger { color: var(--danger); }
.action-sheet-btn-danger svg path { fill: var(--danger); }
.action-sheet-btn-cancel {
  color: var(--text-secondary);
  font-weight: 600;
  margin-top: 4px;
  border-top: 0.5px solid var(--border);
}
.action-sheet-btn-cancel svg { display: none; }
.action-sheet-divider {
  height: 0.5px;
  background: var(--border);
  margin: 0 24px;
}

/* ─── Shopping List Cards ─── */
.shop-card {
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);

}
.shop-card-done {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;

  border: 0.5px solid var(--border);

}
.shop-thumb-sm { width: 32px; height: 32px; border-radius: 0; background-size: cover; background-position: center; flex-shrink: 0; }
.shop-name-done { flex: 1; font-size: 14px; font-family: var(--mono); text-decoration: line-through; color: var(--text-secondary); }
/* ─── Shopping List Cards (new) ─── */
.sl-card { display: flex; border-bottom: 0.5px solid var(--border-thin); min-height: 200px; cursor: pointer; transition: opacity 0.15s; }
.sl-card:first-child { margin-top: 30px; }
.sl-card.sl-done { opacity: 0.45; }
.sl-addr { color: var(--accent) !important; cursor: pointer; }
.sl-img-col { width: 46%; flex-shrink: 0; overflow: hidden; position: relative; background: #F3F4F6; }
.sl-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.sl-img-empty { width: 100%; height: 100%; min-height: 200px; background: #F3F4F6; }
.sl-content { flex: 1; padding: 16px 16px 14px; display: flex; flex-direction: column; gap: 4px; position: relative; min-width: 0; }
.sl-del { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 20px; color: var(--text-tertiary); cursor: pointer; line-height: 1; padding: 0; }
.sl-name { font-size: 15px; font-weight: 700; color: var(--text-primary); font-family: var(--mono); word-break: break-word; padding-right: 24px; }
.sl-subname { font-size: 13px; font-weight: 700; color: var(--text-primary); font-family: var(--mono); letter-spacing: 0.03em; word-break: break-word; }
.sl-meta { font-size: 12px; color: var(--text-secondary); font-family: var(--mono); line-height: 1.5; margin-top: 4px; word-break: break-word; }
.sl-hours { font-size: 13px; font-weight: 700; color: var(--text-primary); font-family: var(--mono); margin-top: 4px; }
.sl-link { font-size: 11px; color: var(--text-tertiary); font-family: var(--mono); margin-top: 4px; word-break: break-all; cursor: pointer; }
.sl-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 10px; }
.sl-qty-row { display: flex; align-items: center; gap: 0; border: 1px solid var(--border); }
.sl-qty-btn { background: none; border: none; width: 36px; height: 36px; font-size: 18px; cursor: pointer; font-family: var(--mono); color: var(--text-primary); display: flex; align-items: center; justify-content: center; }
.sl-qty { font-size: 18px; font-weight: 700; font-family: var(--mono); width: 36px; text-align: center; }
.sl-check { background: none; border: none; cursor: pointer; padding: 0; display: flex; }
.sl-check svg path { fill: var(--text-tertiary); }
.sl-check.sl-checked svg path { fill: var(--text-primary); }
/* photo preview in sheet */
.sf-photo-preview {
  width: 64px; height: 64px; background: #F3F4F6;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; background-size: cover; background-position: center;
}
.sf-photo-plus { font-size: 24px; color: var(--text-tertiary); }
.shop-img-col {
  width: 143px;
  flex-shrink: 0;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: #F3F4F6;
}
.shop-img-col.shop-img-empty { border-right: 0.5px solid var(--border-thin); }
.shop-img-col.shop-img-empty svg path { fill: var(--text-tertiary); }
.shop-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.shop-img-del {
  position: absolute; top: 8px; right: 8px;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(0,0,0,0.55); color: #fff; border: none;
  font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.shop-card-right { flex: 1; min-width: 0; display: flex; flex-direction: column; padding: 16px 16px 14px 18px; gap: 8px; }
.shop-card-top-row { display: flex; align-items: flex-start; gap: 4px; }
.shop-name-input {
  background: none; border: none; border-bottom: 1.5px solid transparent; outline: none;
  font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--text-primary);
  flex: 1; min-width: 0; padding: 0 0 2px; transition: border-color 0.2s; line-height: 1.3;
}
.shop-name-input:focus { border-bottom-color: var(--accent); }
.shop-name-input::placeholder { color: var(--text-tertiary); font-weight: 400; font-size: 15px; }
.shop-qty-row { display: flex; align-items: center; gap: 8px; }
.shop-qty-btn {
  width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border);
  background: none; font-size: 16px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: var(--text-secondary); transition: background 0.12s; line-height: 1;
}
.shop-qty-btn:active { background: var(--accent-light); }
.shop-qty { font-size: 15px; font-weight: 700; font-family: var(--mono); min-width: 18px; text-align: center; }
.shop-del-btn { background: none; border: none; cursor: pointer; padding: 2px; opacity: 0.3; display: flex; flex-shrink: 0; transition: opacity 0.15s; margin-top: 2px; }
.shop-del-btn:active { opacity: 1; }
.shop-del-btn svg path { fill: var(--danger); }
.shop-info-lines { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.shop-info-line { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.shop-info-icon { flex-shrink: 0; display: flex; }
.shop-info-icon svg path { fill: var(--accent); }
.shop-info-text { flex: 1; font-size: 13px; font-family: var(--mono); color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.shop-info-link { color: var(--accent); }
.shop-info-clear { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 14px; padding: 0; opacity: 0.5; flex-shrink: 0; }
.shop-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
.shop-icon-btns { display: flex; gap: 6px; }
.shop-meta-icon-btn {
  background: #F3F4F6; border: none; border-radius: 0;
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.12s;
}
.shop-meta-icon-btn:active { background: var(--accent-light); }
.shop-meta-icon-btn svg path { fill: var(--text-tertiary); }
.shop-buy-btn {
  background: none; border: 1.5px solid var(--border); border-radius: 0;
  padding: 4px 12px; font-family: var(--mono); font-size: 12px; font-weight: 600;
  color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.shop-buy-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
[data-theme='dark'] .shop-card,
[data-theme='dark'] .shop-card-done { background: var(--surface-solid); }
[data-theme='dark'] .shop-img-col { background: rgba(255,255,255,0.06); }
[data-theme='dark'] .shop-meta-icon-btn { background: rgba(255,255,255,0.08); }

/* ═══════════════════════════════════════
   DARK THEME
═══════════════════════════════════════ */
[data-theme='dark'] {
  --bg: #0E0E10;
  --surface: rgba(28, 28, 32, 0.85);
  --surface-solid: #1C1C20;
  --border: rgba(255,255,255,0.1);
  --border-thin: rgba(255,255,255,0.07);
  --text-primary: #F2F2F7;
  --text-secondary: #8E8E93;

  --accent-light: rgba(26,86,219,0.18);
  --accent-mid: rgba(26,86,219,0.28);
}
[data-theme='dark'] #tab-bar {
  background: rgba(14,14,16,0.92);
}
[data-theme='dark'] .screen { background: var(--bg); }
[data-theme='dark'] .screen-header { background: var(--bg); }
[data-theme='dark'] .day-tabs-wrap { background: var(--bg); }
[data-theme='dark'] .modal-sheet,
[data-theme='dark'] .action-sheet { background: rgba(28,28,32,0.98); }
[data-theme='dark'] .modal-input,
[data-theme='dark'] .modal-textarea { background: #2C2C2E; border-color: rgba(255,255,255,0.1); color: var(--text-primary); }
[data-theme='dark'] .expense-total-card,
[data-theme='dark'] .expense-input-card,
[data-theme='dark'] .settings-card,
[data-theme='dark'] .hotel-card { background: #1C1C20; border-color: rgba(255,255,255,0.08); }

[data-theme='dark'] .flight-card { background: linear-gradient(140deg, #0a1830 0%, #112244 42%, #091c36 100%); }
[data-theme='dark'] .confirm-box { background: rgba(28,28,32,0.98); }

/* ═══════════════════════════════════════
   SETTINGS SCREEN
═══════════════════════════════════════ */
.settings-section { padding: 0 16px 6px; }
.settings-section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  padding: 18px 4px 8px;
}
.settings-card {
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  gap: 12px;
}
.settings-row-btn {
  width: 100%;
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--mono);
  text-align: left;
}
.settings-row-btn svg path { fill: var(--text-tertiary); }
.settings-row-danger .settings-label { color: var(--danger); }
.settings-row-danger svg path { fill: var(--danger); }
.settings-label {
  font-size: 15px;
  color: var(--text-primary);
  font-family: var(--mono);
  flex: 1;
}
.settings-input {
  background: none;
  border: none;
  outline: none;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text-secondary);
  text-align: right;
  flex: 1;
  min-width: 0;
}
.settings-input-right { text-align: right; max-width: 100px; }
.settings-currency-prefix {
  font-size: 13px;
  color: var(--text-tertiary);
  font-family: var(--mono);
  flex-shrink: 0;
}
.settings-divider {
  height: 0.5px;
  background: var(--border-thin);
  margin: 0 16px;
}
.settings-currency-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
}
.currency-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 14px 8px;
  background: none;
  border: none;
  border-right: 0.5px solid var(--border-thin);
  cursor: pointer;
  font-family: var(--mono);
  transition: background 0.15s;
}
.currency-btn:last-child { border-right: none; }
.currency-btn.active { background: var(--accent-light); }
.currency-symbol {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
}
.currency-btn.active .currency-symbol { color: var(--accent); }
.currency-label {
  font-size: 10px;
  color: var(--text-tertiary);
  letter-spacing: 0.04em;
}
.currency-btn.active .currency-label { color: var(--accent); }
.settings-theme-row {
  display: flex;
}
.settings-theme-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px;
  background: none;
  border: none;
  border-right: 0.5px solid var(--border-thin);
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s;
}
.settings-theme-btn:last-child { border-right: none; }
.settings-theme-btn.active {
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 600;
}
.settings-theme-icon { font-size: 16px; }

/* ─── Settings Screen (new) ─── */
#screen-settings { background: #fff; }
.set-body { padding: 20px 20px 80px; }
.set-section { border-bottom: 0.5px solid var(--border-thin); margin-bottom: 32px; padding-bottom: 8px; }
.set-section-label { font-size: 12px; color: var(--text-tertiary); font-family: var(--mono); margin-bottom: 4px; }

.set-field:last-child { border-bottom: none; }

.set-field-val {

.set-field-select .set-field-val { cursor: pointer; pointer-events: none; }

}

[data-theme='dark'] #screen-settings { background: var(--bg); }

/* ─── Animations ─── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── Toast ─── */
#app-toast {
  position: fixed;
  bottom: calc(72px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(10,10,10,0.82);
  backdrop-filter: blur(12px);
  color: #fff;
  font-family: var(--mono);
  font-size: 13px;
  padding: 9px 18px;
  border-radius: 0;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 999;
}
#app-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Long-press ripple on day tabs */
.day-tab {
  -webkit-user-select: none;
  user-select: none;
}
.day-tab:active {
  background: var(--accent-light);
  border-radius: 0;
}

<div id="app">

  <!-- ═══ ITINERARY ═══ -->

    </div>

/* ═══════════════════════════════════════
   DATA LAYER
═══════════════════════════════════════ */
const KEY = 'travel_journal_v4';
let data = {
  days: [{ banner: { date: '', subtitle: '', photos: [] }, events: [] }],
  expenses: [[]],
  flights: [],
  hotels: [],
  settings: { tripName: '', budget: 0, currency: 'TWD', theme: 'light' }
};
let currentDay = 0;
let editingEventId = null;
let _slideshowTimer = null;

/* blob URL cache：key → objectURL，session 內有效 */
const _blobCache = new Map();

function load() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) data = JSON.parse(s);
    while (data.expenses.length < data.days.length) data.expenses.push([]);
    if (!data.flights)   data.flights   = [];
    if (!data.hotels)    data.hotels    = [];
    if (!data.tickets)   data.tickets   = [];
    if (!data.checklist) data.checklist = [];
    if (!data.shopping)  data.shopping  = [];
    if (!data.notes)     data.notes     = '';
    if (!data.settings)  data.settings  = { tripName: '', budget: 0, currency: 'TWD', theme: 'light' };
    data.days.forEach(d => {
      if (!d.banner) d.banner = { date: '', subtitle: '', photos: [] };
      if (!d.banner.photos) d.banner.photos = [];
    });
  } catch(e) {}
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e) {}
}

/* ─── Utility ─── */
function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/* ═══════════════════════════════════════
   TAB NAVIGATION
═══════════════════════════════════════ */
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'expense')  renderExpense();
  if (tab === 'info')     renderInfo();
  if (tab === 'settings') renderSettings();
}

/* ═══════════════════════════════════════
   ITINERARY
═══════════════════════════════════════ */
function renderItinerary() {
  renderDayTabs();
  renderBanner();
  renderTimeline();
}

/* ─── Custom Confirm Dialog ─── */
function showConfirm(title, msg, onOk) {
  let el = document.getElementById('app-confirm');
  if (!el) {
    el = document.createElement('div');
    el.id = 'app-confirm';
    el.innerHTML = `
      <div class="confirm-box">
        <div class="confirm-title" id="confirm-title"></div>
        <div class="confirm-msg" id="confirm-msg"></div>
        <div class="confirm-btns">
          <button class="confirm-btn confirm-cancel" id="confirm-cancel">取消</button>
          <button class="confirm-btn confirm-ok" id="confirm-ok">刪除</button>
        </div>
      </div>`;
    document.body.appendChild(el);
  }
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  el.classList.add('show');
  const ok     = document.getElementById('confirm-ok');
  const cancel = document.getElementById('confirm-cancel');
  const close  = () => el.classList.remove('show');
  ok.onclick     = () => { close(); onOk(); };
  cancel.onclick = () => close();
  el.onclick     = (e) => { if (e.target === el) close(); };
}


function deleteDay(i) {
  if (data.days.length <= 1) {
    showToast('至少保留一天');
    return;
  }
  showConfirm(`刪除 Day ${i + 1}？`, '此天的行程與帳單將一併移除。', () => {
    data.days.splice(i, 1);
    data.expenses.splice(i, 1);
    currentDay = Math.min(currentDay, data.days.length - 1);

/* ─── Date Auto-format: digits → YYYY/MM/DD（weekday） ─── */
const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];

function fmtDate(el) {
  let digits = el.value.replace(/\D/g, '').slice(0, 8);
  let out = '';
  if (digits.length <= 4) {
    out = digits;
  } else if (digits.length <= 6) {
    out = digits.slice(0, 4) + '/' + digits.slice(4);
  } else {
    out = digits.slice(0, 4) + '/' + digits.slice(4, 6) + '/' + digits.slice(6);
  }
  if (digits.length === 8) {
    const y  = parseInt(digits.slice(0, 4));
    const m  = parseInt(digits.slice(4, 6)) - 1;
    const d  = parseInt(digits.slice(6, 8));
    const dt = new Date(y, m, d);
    if (!isNaN(dt.getTime())) {
      out += '（' + WEEKDAYS[dt.getDay()] + '）';
    }
  }
  el.value = out;
}

/* parse "YYYY/MM/DD…" → Date or null */
function parseBannerDate(str) {
  const m = String(str || '').match(/(\d{4})\/(\d{2})\/(\d{2})/);
  if (!m) return null;
  return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
}

/* ─── Date helpers ─── */
function dateToStr(dt) {
  const y  = dt.getFullYear();
  const mo = String(dt.getMonth() + 1).padStart(2, '0');
  const d  = String(dt.getDate()).padStart(2, '0');
  const wd = WEEKDAYS[dt.getDay()];
  return `${y}/${mo}/${d}（${wd}）`;
}

/* 從任一已知天推算所有空白天的日期 */
function inferAllDates() {
  // 找第一個有日期的 anchor
  let anchorIdx = -1;
  let anchorDate = null;
  for (let i = 0; i < data.days.length; i++) {
    const d = parseBannerDate(data.days[i].banner.date);
    if (d) { anchorIdx = i; anchorDate = d; break; }
  }
  if (anchorIdx === -1) return; // 沒有任何日期，無法推算

  // 往前推
  for (let i = anchorIdx - 1; i >= 0; i--) {
    if (!parseBannerDate(data.days[i].banner.date)) {
      const dt = new Date(anchorDate);
      dt.setDate(dt.getDate() - (anchorIdx - i));
      data.days[i].banner.date = dateToStr(dt);
    }
  }
  // 往後推
  for (let i = anchorIdx + 1; i < data.days.length; i++) {
    if (!parseBannerDate(data.days[i].banner.date)) {
      const dt = new Date(anchorDate);
      dt.setDate(dt.getDate() + (i - anchorIdx));
      data.days[i].banner.date = dateToStr(dt);
    }
  }
}

/* resolve stored value → displayable URL */
function resolvePhoto(val) {
  if (!val) return '';
  if (val.startsWith('blob-key:')) return _blobCache.get(val) || '';
  return val;
}

function addDay() {
  // 先找最後一個有日期的天往後推一天
  let nextDate = '';
  for (let i = data.days.length - 1; i >= 0; i--) {
    const d = parseBannerDate(data.days[i].banner.date);
    if (d) {
      d.setDate(d.getDate() + (data.days.length - i));
      nextDate = dateToStr(d);
      break;
    }
  }
  data.days.push({ banner: { date: nextDate, subtitle: '', photos: [] }, events: [] });
  data.expenses.push([]);
  currentDay = data.days.length - 1;
  save();
  renderItinerary();
  const etabs = document.getElementById('expense-day-tabs');
  if (etabs) renderExpenseDayTabs();
}

function removeBannerPhoto(idx) {

function handleGridUpload(input) {
  const files = [...input.files];
  const photos = data.days[currentDay].banner.photos || [];
  const remaining = 5 - photos.length;
  files.slice(0, remaining).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result;
      const key = `blob-key:${Date.now()}-${Math.random().toString(36).slice(2)}|${file.name}`;
      _blobCache.set(key, base64);
      data.days[currentDay].banner.photos.push(key);
      renderPhotoGrid();
    };
    reader.readAsDataURL(file);
  });
}

function fmtFlightTimes(el) {
  // 收集純數字
  const digits = el.value.replace(/\D/g, '');
  if (digits.length <= 4) {
    // 只有出發時間
    if (digits.length === 4) {
      el.value = digits.slice(0,2) + ':' + digits.slice(2,4);
    }
  } else {
    // 有抵達時間
    const dep = digits.slice(0,4);
    const arr = digits.slice(4,8);
    let out = dep.slice(0,2) + ':' + dep.slice(2,4);
    if (arr.length >= 4) {
      out += ' — ' + arr.slice(0,2) + ':' + arr.slice(2,4);
    } else if (arr.length > 0) {
      out += ' — ' + arr;
    }
    el.value = out;
  }
}

/* ─── Hotel Bottom Sheet ─── */
let _hotelEditId = null;
let _sheetBreakfast = false;

function calcNights(checkin, checkout) {
  const parse = s => {
    const m = String(s||'').match(/(\d{1,2})\/(\d{1,2})/);
    if (!m) return null;
    return new Date(new Date().getFullYear(), parseInt(m[1])-1, parseInt(m[2]));
  };
  const a = parse(checkin), b = parse(checkout);
  if (!a || !b) return 0;
  const diff = Math.round((b - a) / 86400000);
  return diff > 0 ? diff : 0;
}

function fmtHotelPrice(el) {
  const raw = el.value.replace(/[^0-9]/g, '');
  if (raw) el.value = parseInt(raw).toLocaleString();
  else el.value = '';
}

function fmtShopHours(el) {
  // 輸入 09001200 → 09:00-12:00
  const digits = el.value.replace(/\D/g, '').slice(0, 8);
  const fmtTime = (d4) => {
    if (d4.length <= 2) return d4;
    return d4.slice(0,2) + ':' + d4.slice(2,4);
  };
  if (digits.length <= 4) {
    el.value = fmtTime(digits);
  } else {
    el.value = fmtTime(digits.slice(0,4)) + '-' + fmtTime(digits.slice(4,8));
  }
}


function fmtHotelDates(el) {
  const raw    = el.value;
  const digits = raw.replace(/\D/g, '').slice(0, 8);
  const fmt = (d4) => {
    if (d4.length < 4) return d4.slice(0,2) + (d4.length > 2 ? '/' + d4.slice(2) : '');
    const mo = d4.slice(0,2), dy = d4.slice(2,4);
    const dt = new Date(new Date().getFullYear(), parseInt(mo)-1, parseInt(dy));
    const wd = ['日','一','二','三','四','五','六'][dt.getDay()];
    return mo + '/' + dy + '（' + wd + '）';
  };
  if (digits.length <= 4) {
    el.value = fmt(digits);
  } else {
    el.value = fmt(digits.slice(0,4)) + '-' + fmt(digits.slice(4,8));
  }
}

            <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
          </button>
        </div>
      </div>
      <div class="hotel2-name">${esc(h.name || '未命名')}</div>
      ${h.ref ? `<div class="hotel2-ref"><span class="hotel2-ref-label">訂單編號</span><span class="hotel2-ref-val">${esc(h.ref)}</span></div>` : ''}
      ${h.addr ? `<div class="hotel2-addr" onclick="event.stopPropagation();window.open('https://maps.google.com/?q=${encodeURIComponent(h.addr)}','_blank')">
        <svg xmlns="http://www.w3.org/2000/svg" height="14px" viewBox="0 -960 960 960" width="14px"><path d="M480-480q33 0 56.5-23.5T560-560q0-33-23.5-56.5T480-640q-33 0-56.5 23.5T400-560q0 33 23.5 56.5T480-480Zm0 294q122-112 181-203.5T720-560q0-109-69.5-184.5T480-820q-101 0-170.5 75.5T240-560q0 71 59 162.5T480-186Zm0 106Q319-217 239.5-334.5T160-560q0-150 96.5-245T480-900q127 0 223.5 95T800-560q0 112-79.5 229.5T480-80Zm0-480Z"/></svg>
        ${esc(h.addr)}</div>` : ''}
      ${h.breakfast ? `<div class="hotel2-tags"><span class="hotel2-tag-breakfast">含早餐</span></div>` : ''}
      ${priceDisplay ? `<div class="hotel2-price-row">
        <span class="hotel2-price-label">總價</span>
        <span class="hotel2-price-val">${priceDisplay}</span>
      </div>` : ''}
    </div>`;
  }).join('');
}

function closeModal(id) {

/* ═══════════════════════════════════════
   SETTINGS
═══════════════════════════════════════ */
const CURRENCIES = [
  { code: 'TWD', symbol: 'NT$',  label: '新台幣' },
  { code: 'JPY', symbol: '¥',    label: '日圓'   },
  { code: 'CNY', symbol: 'CN¥',  label: '人民幣' },
  { code: 'HKD', symbol: 'HK$',  label: '港幣'   },
  { code: 'USD', symbol: '$',    label: '美金'   },
  { code: 'EUR', symbol: '€',    label: '歐元'   },
  { code: 'THB', symbol: '฿',    label: '泰銖'   },
];

function renderSettings() {
  const s = data.settings;
  const nameEl = document.getElementById('set-trip-name');
  if (nameEl) nameEl.value = s.tripName || '';
  const datesEl = document.getElementById('set-trip-dates');
  if (datesEl) datesEl.value = s.tripDates || '';
  // Currency display
  const c = CURRENCIES.find(c => c.code === (s.currency || 'TWD'));
  const disp = document.getElementById('set-currency-display');
  if (disp) disp.textContent = c ? c.symbol + ' ' + c.label : 'NT$ 新台幣';
  const sel = document.getElementById('set-currency');
  if (sel) sel.value = s.currency || 'TWD';
  // Tags
  renderSettingsTags();
  applyTheme(s.theme);
}

function toggleCurrencyDropdown() {
  const dd = document.getElementById('set-currency-dropdown');
  if (dd) dd.classList.toggle('open');
}

function setCurrencyFromSelect() {
  const sel = document.getElementById('set-currency');
  if (!sel) return;
  data.settings.currency = sel.value;
  save();
  const c = CURRENCIES.find(c => c.code === sel.value);
  const disp = document.getElementById('set-currency-display');
  if (disp && c) disp.textContent = c.symbol + ' ' + c.label;
  document.getElementById('set-currency-dropdown')?.classList.remove('open');
  renderExpenseList();
}

function renderSettingsTags() {
  const cloud = document.getElementById('set-tags-cloud');
  if (!cloud) return;
  const tags = data.settings.tags || [];
  cloud.innerHTML = tags.map((t, i) =>
    `<span class="set-tag-chip ${t.active?'active':''}" onclick="toggleSettingsTag(${i})">${esc(t.text)}</span>`
  ).join('');
  const disp = document.getElementById('set-tags-display');
  if (disp) {
    const active = tags.filter(t => t.active).map(t => t.text);
    disp.textContent = active.length ? active.join('，') : '加入標籤';
  }
}

function openTagSheet() {
  if (!data.settings.tags) data.settings.tags = [];
  renderSettingsTags();
  document.getElementById('modal-tag-sheet').classList.add('open');
  setTimeout(() => document.getElementById('set-tag-input')?.focus(), 340);
}

function addSettingsTag() {
  const inp = document.getElementById('set-tag-input');
  const text = inp?.value.trim();
  if (!text) return;
  if (!data.settings.tags) data.settings.tags = [];
  data.settings.tags.push({ text, active: true });
  save();
  inp.value = '';
  renderSettingsTags();
}

function toggleSettingsTag(idx) {
  if (!data.settings.tags) return;
  data.settings.tags[idx].active = !data.settings.tags[idx].active;
  save();
  renderSettingsTags();
}

// Close currency dropdown on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('.set-field-select')) {
    document.getElementById('set-currency-dropdown')?.classList.remove('open');
  }
});

function fmtTripDates(el) {
  const digits = el.value.replace(/\D/g, '').slice(0, 8);
  const fmt = (d4) => {
    if (d4.length < 3) return d4.slice(0,2) + (d4.length === 2 ? '/' : '');
    const mo = d4.slice(0,2), dy = d4.slice(2,4);
    if (d4.length < 4) return mo + '/' + dy;
    const dt = new Date(new Date().getFullYear(), parseInt(mo)-1, parseInt(dy));
    const wd = ['日','一','二','三','四','五','六'][dt.getDay()];
    return mo + '/' + dy + '（' + wd + '）';
  };
  if (digits.length <= 4) {
    el.value = fmt(digits);
  } else {
    el.value = fmt(digits.slice(0,4)) + '-' + fmt(digits.slice(4,8));
  }
}

function saveSettings() {
  data.settings.tripName  = document.getElementById('set-trip-name')?.value.trim() || '';
  data.settings.tripDates = document.getElementById('set-trip-dates')?.value.trim() || '';
  save();
  renderBanner();
}

function setCurrency(code) {
  data.settings.currency = code;
  save();
  renderSettings();
  renderExpenseList();
}

function setTheme(mode) {
  data.settings.theme = mode;
  save();
  applyTheme(mode);
  renderSettings();
}

function applyTheme(mode) {
  document.documentElement.setAttribute('data-theme', mode);
}

function getCurrencySymbol() {
  const c = CURRENCIES.find(c => c.code === (data.settings?.currency || 'TWD'));
  return c ? c.symbol : 'NT$';
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `travel-journal-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('已匯出 JSON');
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.days) throw new Error('格式錯誤');
      showConfirm('匯入資料', '現有資料將被覆蓋，確定繼續？', () => {
        data = imported;
        if (!data.settings) data.settings = { tripName: '', budget: 0, currency: 'TWD', theme: 'light' };
        save();
        renderItinerary();
        renderExpense();
        renderSettings();
        showToast('匯入成功');
      });
    } catch {
      showToast('檔案格式錯誤');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function clearAllData() {
  showConfirm('清除所有資料', '所有行程、帳單、資訊將永久刪除。', () => {
    data = {
      days: [{ banner: { date: '', subtitle: '', photos: [] }, events: [] }],
      expenses: [[]],
      flights: [],
      hotels: [],
      settings: { tripName: '', budget: 0, currency: 'TWD', theme: 'light' }
    };
    currentDay  = 0;
    expenseDay  = 0;
    save();
    renderItinerary();
    renderExpense();
    renderSettings();
    switchTab('itinerary');
    showToast('已清除所有資料');
  });
}


load();
applyTheme(data.settings?.theme || 'light');
renderItinerary();
renderExpense();
