<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="旅遊誌">
  <meta name="theme-color" content="#F8F9FA">
  <title>旅遊誌</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ═══ ITINERARY ═══ -->
  <div id="screen-itinerary" class="screen active">
    <!-- Banner (rendered by JS) -->
    <div id="banner-area"></div>

    <!-- Day Tabs -->
    <div class="day-tabs-wrap">
      <div class="day-tabs-header">
        <span class="day-tabs-label">DAY</span>
        <button class="day-add-btn" onclick="addDay()">＋</button>
      </div>
      <div class="day-tabs" id="day-tabs"></div>
    </div>

    <!-- Timeline -->
    <div class="timeline-section">
      <button class="add-event-btn" onclick="openEventModal()">＋ 新增行程</button>
      <div class="timeline" id="timeline-list"></div>
    </div>
  </div>

  <!-- ═══ EXPENSE ═══ -->
  <div id="screen-expense" class="screen">
    <div class="screen-header">
      <div style="display:flex; align-items:baseline; justify-content:space-between; padding: 10px 16px 0;">
        <div class="screen-title">記帳</div>
      </div>
      <div class="day-tabs-wrap" style="border-bottom:none; padding:0 16px;">
        <div class="day-tabs-header">
          <span class="day-tabs-label">DAY</span>
        </div>
        <div class="day-tabs" id="expense-day-tabs"></div>
      </div>
    </div>
    <div style="padding:0 16px 16px">
      <div class="expense-total-card">
        <div>
          <div class="expense-total-label">當日合計</div>
          <div class="expense-total-sub" id="expense-count">0 筆記錄</div>
        </div>
        <div style="text-align:right">
          <div class="expense-total-amount" id="expense-total">0</div>
          <div class="expense-trip-total-row">
            <span class="expense-trip-label">旅行總計</span>
            <span class="expense-trip-amount" id="expense-trip-total">0</span>
          </div>
        </div>
      </div>
    </div>
    <div class="expense-input-card">
      <div class="expense-add-row">
        <div class="exp-cat-wrap" id="exp-cat-wrap">
          <button class="expense-input expense-cat-btn" id="exp-cat-btn" onclick="toggleCatDropdown()" type="button">
            <span id="exp-cat-icon" class="exp-cat-icon-slot"></span>
            <span id="exp-cat-label">類別</span>
            <svg xmlns="http://www.w3.org/2000/svg" height="14px" viewBox="0 0 24 24" width="14px" style="margin-left:auto;flex-shrink:0"><path fill="#9CA3AF" d="M7 10l5 5 5-5z"/></svg>
          </button>
          <div class="exp-cat-dropdown" id="exp-cat-dropdown"></div>
        </div>
        <input class="expense-input expense-input-amount" id="exp-amount" placeholder="金額" type="number" inputmode="decimal">
      </div>
      <div class="expense-add-row">
        <input class="expense-input exp-name-input" id="exp-name" placeholder="品項說明（選填）" type="text">
      </div>
      <button class="expense-submit-btn" onclick="addExpense()">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#fff"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
      </button>
    </div>
    <div class="expense-list" id="expense-list"></div>
  </div>

  <!-- ═══ INFO HUB ═══ -->
  <div id="screen-info" class="screen">
    <div class="screen-header">
      <div style="padding: 10px 16px 0">
        <div class="screen-title">旅遊資訊</div>
      </div>
    </div>
    <div class="info-grid">
      <button class="info-grid-btn" onclick="openInfoSub('flight')">
        <div class="info-grid-icon" style="background:none">
          <svg xmlns="http://www.w3.org/2000/svg" height="44px" viewBox="0 -960 960 960" width="44px" fill="#1A56DB"><path d="M280-80v-100l120-84v-144L80-280v-120l320-224v-176q0-33 23.5-56.5T480-880q33 0 56.5 23.5T560-800v176l320 224v120L560-408v144l120 84v100l-200-60-200 60Z"/></svg>
        </div>
        <span>機票</span>
      </button>
      <button class="info-grid-btn" onclick="openInfoSub('hotel')">
        <div class="info-grid-icon" style="background:none">
          <svg xmlns="http://www.w3.org/2000/svg" height="44px" viewBox="0 -960 960 960" width="44px" fill="#4B5563"><path d="M40-200v-600h80v400h320v-320h320q66 0 113 47t47 113v360h-80v-120H120v120H40Zm155-275q-35-35-35-85t35-85q35-35 85-35t85 35q35 35 35 85t-35 85q-35 35-85 35t-85-35Zm325 75h320v-160q0-33-23.5-56.5T760-640H520v240ZM308.5-531.5Q320-543 320-560t-11.5-28.5Q297-600 280-600t-28.5 11.5Q240-577 240-560t11.5 28.5Q263-520 280-520t28.5-11.5ZM280-560Zm240-80v240-240Z"/></svg>
        </div>
        <span>住宿</span>
      </button>
      <button class="info-grid-btn" onclick="openInfoSub('checklist')">
        <div class="info-grid-icon" style="background:none">
          <svg xmlns="http://www.w3.org/2000/svg" height="44px" viewBox="0 -960 960 960" width="44px" fill="#0D9488"><path d="M200-200v-560 454-85 191Zm0 80q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h560q33 0 56.5 23.5T840-760v320h-80v-320H200v560h280v80H200Zm494 40L552-222l57-56 85 85 170-170 56 57L694-80ZM348.5-451.5Q360-463 360-480t-11.5-28.5Q337-520 320-520t-28.5 11.5Q280-497 280-480t11.5 28.5Q303-440 320-440t28.5-11.5Zm0-160Q360-623 360-640t-11.5-28.5Q337-680 320-680t-28.5 11.5Q280-657 280-640t11.5 28.5Q303-600 320-600t28.5-11.5ZM440-440h240v-80H440v80Zm0-160h240v-80H440v80Z"/></svg>
        </div>
        <span>點檢表</span>
      </button>
      <button class="info-grid-btn" onclick="openInfoSub('shopping')">
        <div class="info-grid-icon" style="background:none">
          <svg xmlns="http://www.w3.org/2000/svg" height="44px" viewBox="0 -960 960 960" width="44px" fill="#E05252"><path d="M240-80q-50 0-85-35t-35-85v-120h120v-560l60 60 60-60 60 60 60-60 60 60 60-60 60 60 60-60 60 60 60-60v680q0 50-35 85t-85 35H240Zm480-80q17 0 28.5-11.5T760-200v-560H320v440h360v120q0 17 11.5 28.5T720-160ZM360-600v-80h240v80H360Zm0 120v-80h240v80H360Zm320-120q-17 0-28.5-11.5T640-640q0-17 11.5-28.5T680-680q17 0 28.5 11.5T720-640q0 17-11.5 28.5T680-600Zm0 120q-17 0-28.5-11.5T640-520q0-17 11.5-28.5T680-560q17 0 28.5 11.5T720-520q0 17-11.5 28.5T680-480ZM240-160h360v-80H200v40q0 17 11.5 28.5T240-160Zm-40 0v-80 80Z"/></svg>
        </div>
        <span>購物清單</span>
      </button>
      <button class="info-grid-btn" onclick="openInfoSub('ticket')">
        <div class="info-grid-icon" style="background:none">
          <svg xmlns="http://www.w3.org/2000/svg" height="44px" viewBox="0 -960 960 960" width="44px" fill="#D97706"><path d="m368-320 112-84 110 84-42-136 112-88H524l-44-136-44 136H300l110 88-42 136ZM160-160q-33 0-56.5-23.5T80-240v-135q0-11 7-19t18-10q24-8 39.5-29t15.5-47q0-26-15.5-47T105-556q-11-2-18-10t-7-19v-135q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v135q0 11-7 19t-18 10q-24 8-39.5 29T800-480q0 26 15.5 47t39.5 29q11 2 18 10t7 19v135q0 33-23.5 56.5T800-160H160Zm0-80h640v-102q-37-22-58.5-58.5T720-480q0-43 21.5-79.5T800-618v-102H160v102q37 22 58.5 58.5T240-480q0 43-21.5 79.5T160-342v102Zm320-240Z"/></svg>
        </div>
        <span>票券</span>
      </button>
      <button class="info-grid-btn" onclick="openInfoSub('notes')">
        <div class="info-grid-icon" style="background:none">
          <svg xmlns="http://www.w3.org/2000/svg" height="44px" viewBox="0 -960 960 960" width="44px" fill="#65A30D"><path d="M160-400v-80h280v80H160Zm0-160v-80h440v80H160Zm0-160v-80h440v80H160Zm360 560v-123l221-220q9-9 20-13t22-4q12 0 23 4.5t20 13.5l37 37q8 9 12.5 20t4.5 22q0 11-4 22.5T863-380L643-160H520Zm300-263-37-37 37 37ZM580-220h38l121-122-18-19-19-18-122 121v38Zm141-141-19-18 37 37-18-19Z"/></svg>
        </div>
        <span>筆記</span>
      </button>
    </div>
  </div>

  <!-- ═══ INFO SUB: FLIGHT ═══ -->
  <div id="screen-info-flight" class="screen screen-sub">
    <div class="screen-header sub-header">
      <button class="sub-back-btn" onclick="closeInfoSub('flight')">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
      </button>
      <div class="screen-title">機票</div>
    </div>
    <div class="info-section">
      <div id="flight-cards"></div>
      <button class="add-card-btn" onclick="addFlightCard()">＋ 新增機票</button>
    </div>
  </div>

  <!-- ═══ INFO SUB: HOTEL ═══ -->
  <div id="screen-info-hotel" class="screen screen-sub">
    <div class="screen-header sub-header">
      <button class="sub-back-btn" onclick="closeInfoSub('hotel')">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
      </button>
      <div class="screen-title" style="flex:1">住宿</div>
      <button class="sub-header-action" onclick="openHotelSheet()">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
      </button>
    </div>
    <div class="info-section">
      <div id="hotel-cards"></div>
    </div>
  </div>

  <!-- ═══ HOTEL BOTTOM SHEET ═══ -->
  <div class="modal-overlay" id="modal-hotel-sheet">
    <div class="modal-sheet hotel-sheet">
      <div class="modal-handle"></div>

      <!-- 即時預覽卡片 -->
      <div class="hotel-preview-wrap">
        <div class="hotel-preview-card" id="hotel-preview-card">
          <div class="hotel-preview-header">
            <div class="hotel-preview-dates" id="hp-dates">MM/DD — MM/DD</div>
            <div class="hotel-preview-nights" id="hp-nights"></div>
          </div>
          <div class="hotel-preview-name" id="hp-name">飯店名稱</div>
          <div class="hotel-preview-sub" id="hp-sub"></div>
          <div class="hotel-preview-meta" id="hp-meta"></div>
        </div>
      </div>

      <!-- 表單欄位 -->
      <div class="hotel-sheet-form">
        <div class="hotel-field-group">
          <div class="hotel-field-label">飯店名稱</div>
          <input class="hotel-field-input" id="hf-name" placeholder="例：大阪喜來登" oninput="updateHotelPreview()">
        </div>
        <div class="hotel-field-group">
          <div class="hotel-field-label">入住日期</div>
          <div class="hotel-date-row">
            <input class="hotel-field-input hotel-date-input" id="hf-checkin" placeholder="MM/DD"
              oninput="fmtHotelDate(this);updateHotelPreview()">
            <span class="hotel-date-arrow">→</span>
            <input class="hotel-field-input hotel-date-input" id="hf-checkout" placeholder="MM/DD"
              oninput="fmtHotelDate(this);updateHotelPreview()">
          </div>
        </div>
        <div class="hotel-field-group">
          <div class="hotel-field-label">地址</div>
          <input class="hotel-field-input" id="hf-addr" placeholder="例：大阪市北区梅田" oninput="updateHotelPreview()">
        </div>
        <div class="hotel-field-group">
          <div class="hotel-field-label">訂房編號</div>
          <input class="hotel-field-input" id="hf-ref" placeholder="例：ABC123456" oninput="updateHotelPreview()">
        </div>
        <div class="hotel-field-group hotel-field-row">
          <div>
            <div class="hotel-field-label">早餐</div>
            <div class="hotel-breakfast-toggle-row">
              <div class="hotel-toggle" id="hf-breakfast-toggle" onclick="toggleSheetBreakfast()">
                <div class="hotel-toggle-knob"></div>
              </div>
              <span class="hotel-toggle-label" id="hf-breakfast-label">不含</span>
            </div>
          </div>
          <div style="flex:1;min-width:0">
            <div class="hotel-field-label">總價</div>
            <input class="hotel-field-input" id="hf-price" placeholder="0" type="text" inputmode="decimal"
              oninput="fmtHotelPrice(this);updateHotelPreview()">
          </div>
        </div>
        <div class="modal-btn-row" style="padding:0">
          <button class="modal-btn modal-btn-cancel" onclick="closeModal('modal-hotel-sheet')">取消</button>
          <button class="modal-btn modal-btn-save" id="hotel-sheet-save-btn" onclick="saveHotelSheet()">儲存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ INFO SUB: CHECKLIST ═══ -->
  <div id="screen-info-checklist" class="screen screen-sub">
    <div class="screen-header sub-header">
      <button class="sub-back-btn" onclick="closeInfoSub('checklist')">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
      </button>
      <div class="screen-title" style="flex:1">點檢表</div>
    </div>
    <div class="info-section">
      <div id="checklist-items"></div>
    </div>
  </div>

  <!-- ═══ INFO SUB: SHOPPING ═══ -->
  <div id="screen-info-shopping" class="screen screen-sub">
    <div class="screen-header sub-header">
      <button class="sub-back-btn" onclick="closeInfoSub('shopping')">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
      </button>
      <div class="screen-title" style="flex:1">購物清單</div>
      <button class="sub-header-action" onclick="addShopItem()">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
      </button>
    </div>
    <div class="info-section">
      <div id="shopping-items"></div>
    </div>
  </div>

  <!-- ═══ INFO SUB: TICKET ═══ -->
  <div id="screen-info-ticket" class="screen screen-sub">
    <div class="screen-header sub-header">
      <button class="sub-back-btn" onclick="closeInfoSub('ticket')">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
      </button>
      <div class="screen-title" style="flex:1">票券</div>
      <label class="sub-header-action">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
        <input type="file" accept="image/*" multiple style="display:none" onchange="addTicketFromPhoto(this)">
      </label>
    </div>
    <div class="info-section">
      <div id="ticket-cards"></div>
    </div>
  </div>

  <!-- ═══ INFO SUB: NOTES ═══ -->
  <div id="screen-info-notes" class="screen screen-sub">
    <div class="screen-header sub-header">
      <button class="sub-back-btn" onclick="closeInfoSub('notes')">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
      </button>
      <div class="screen-title">筆記</div>
    </div>
    <div class="info-section">
      <textarea class="notes-textarea" id="notes-content" placeholder="旅行筆記…" oninput="saveNotes()"></textarea>
    </div>
  </div>

  <!-- ═══ SETTINGS ═══ -->
  <div id="screen-settings" class="screen">
    <div class="screen-header">
      <div style="padding: 10px 16px 0">
        <div class="screen-title">設定</div>
      </div>
    </div>

    <!-- 旅行資訊 -->
    <div class="settings-section">
      <div class="settings-section-title">旅行資訊</div>
      <div class="settings-card">
        <div class="settings-row">
          <span class="settings-label">旅行名稱</span>
          <input class="settings-input" id="set-trip-name" placeholder="例：2025 日本關西" onblur="saveSettings()">
        </div>
      </div>
    </div>

    <!-- 幣別 -->
    <div class="settings-section">
      <div class="settings-section-title">幣別</div>
      <div class="settings-card">
        <div class="settings-currency-grid" id="currency-grid"></div>
      </div>
    </div>

    <!-- 主題 -->
    <div class="settings-section">
      <div class="settings-section-title">主題模式</div>
      <div class="settings-card">
        <div class="settings-theme-row">
          <button class="settings-theme-btn active" id="theme-light" onclick="setTheme('light')">淺色</button>
          <button class="settings-theme-btn" id="theme-dark" onclick="setTheme('dark')">深色</button>
        </div>
      </div>
    </div>

    <!-- 資料 -->
    <div class="settings-section">
      <div class="settings-section-title">資料管理</div>
      <div class="settings-card">
        <button class="settings-row settings-row-btn" onclick="exportJSON()">
          <span class="settings-label">匯出 JSON</span>
          <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px"><path d="M480-320 280-520l56-58 104 104v-326h80v326l104-104 56 58-200 200ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"/></svg>
        </button>
        <div class="settings-divider"></div>
        <label class="settings-row settings-row-btn">
          <span class="settings-label">匯入 JSON</span>
          <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px"><path d="M440-320v-326L336-542l-56-58 200-200 200 200-56 58-104-104v326h-80ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"/></svg>
          <input type="file" accept=".json" style="display:none" onchange="importJSON(this)">
        </label>
        <div class="settings-divider"></div>
        <button class="settings-row settings-row-btn settings-row-danger" onclick="clearAllData()">
          <span class="settings-label">清除所有資料</span>
          <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/></svg>
        </button>
      </div>
    </div>

    <div style="height:40px"></div>
  </div>

  <!-- ═══ TAB BAR ═══ -->
  <nav id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('itinerary')" id="tab-itinerary">
      <span class="tab-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
          <path d="M200-80q-33 0-56.5-23.5T120-160v-560q0-33 23.5-56.5T200-800h40v-80h80v80h320v-80h80v80h40q33 0 56.5 23.5T840-720v560q0 33-23.5 56.5T760-80H200Zm0-80h560v-400H200v400Zm0-480h560v-80H200v80Zm0 0v-80 80Zm280 240q-17 0-28.5-11.5T440-440q0-17 11.5-28.5T480-480q17 0 28.5 11.5T520-440q0 17-11.5 28.5T480-400Zm-188.5-11.5Q280-423 280-440t11.5-28.5Q303-480 320-480t28.5 11.5Q360-457 360-440t-11.5 28.5Q337-400 320-400t-28.5-11.5ZM640-400q-17 0-28.5-11.5T600-440q0-17 11.5-28.5T640-480q17 0 28.5 11.5T680-440q0 17-11.5 28.5T640-400ZM480-240q-17 0-28.5-11.5T440-280q0-17 11.5-28.5T480-320q17 0 28.5 11.5T520-280q0 17-11.5 28.5T480-240Zm-188.5-11.5Q280-263 280-280t11.5-28.5Q303-320 320-320t28.5 11.5Q360-297 360-280t-11.5 28.5Q337-240 320-240t-28.5-11.5ZM640-240q-17 0-28.5-11.5T600-280q0-17 11.5-28.5T640-320q17 0 28.5 11.5T680-280q0 17-11.5 28.5T640-240Z"/>
        </svg>
      </span>

<!-- ═══ EVENT MODAL ═══ -->
<div class="modal-overlay" id="modal-event">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-event-title">新增行程</div>
    <div class="modal-body">
      <div class="modal-label">時間</div>
      <input class="modal-input" id="ev-time" type="time">
      <div class="modal-label">標題</div>
      <input class="modal-input" id="ev-title" placeholder="例：抵達關西機場">
      <div class="modal-label">備注</div>
      <textarea class="modal-textarea" id="ev-note" placeholder="詳細說明（選填）"></textarea>
      <div class="modal-btn-row">
        <button class="modal-btn modal-btn-cancel" onclick="closeModal('modal-event')">取消</button>
        <button class="modal-btn modal-btn-save" onclick="saveEvent()">儲存</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ BANNER PHOTO MODAL ═══ -->
<div class="modal-overlay" id="modal-banner">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">封面照片</div>
    <div class="modal-body">
      <div class="photo-grid" id="photo-grid"></div>
      <div class="modal-btn-row">
        <button class="modal-btn modal-btn-cancel" onclick="closeModal('modal-banner')">取消</button>
        <button class="modal-btn modal-btn-save" onclick="saveBanner()">儲存</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ BANNER ACTION SHEET ═══ -->
<div class="modal-overlay" id="action-sheet-banner">
  <div class="action-sheet">
    <div class="modal-handle"></div>
    <button class="action-sheet-btn" onclick="bannerActionEdit()">
      <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px"><path d="M480-480ZM200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h320v80H200v560h560v-320h80v320q0 33-23.5 56.5T760-120H200Zm40-160h480L570-480 450-320l-90-120-120 160Zm440-320v-80h-80v-80h80v-80h80v80h80v80h-80v80h-80Z"/></svg>
      選擇照片
    </button>
    <div class="action-sheet-divider"></div>
    <button class="action-sheet-btn action-sheet-btn-danger" onclick="bannerActionDelete()">
      <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/></svg>
      刪除此天行程
    </button>
    <button class="action-sheet-btn action-sheet-btn-cancel" onclick="closeActionSheet('action-sheet-banner')">取消</button>
  </div>
</div>

<!-- ═══ CHECKLIST ADD MODAL ═══ -->
<div class="modal-overlay" id="modal-checklist-add">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">新增項目</div>
    <div class="modal-body">
      <input class="modal-input" id="checklist-add-input" placeholder="項目名稱"
        onkeydown="if(event.key==='Enter')saveChecklistModal()">
      <div class="modal-btn-row">
        <button class="modal-btn modal-btn-cancel" onclick="closeModal('modal-checklist-add')">取消</button>
        <button class="modal-btn modal-btn-save" onclick="saveChecklistModal()">加入</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ SHOP FIELD SHEET ═══ -->
<div class="modal-overlay" id="modal-shop-field">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="shop-field-title">備注</div>
    <div class="modal-body">
      <input class="modal-input" id="shop-field-input" placeholder=""
        onkeydown="if(event.key==='Enter')saveShopFieldFromModal()">
      <div class="modal-btn-row">
        <button class="modal-btn modal-btn-cancel" onclick="closeModal('modal-shop-field')">取消</button>
        <button class="modal-btn modal-btn-save" onclick="saveShopFieldFromModal()">儲存</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
